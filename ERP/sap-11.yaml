          (3W4)](https://rapid.sap.com/bp/#/scopeitems/3W4 " Link To BP ")
        format: markdown
  - name: Authentication Methods
    values:
      - text: 'Basic, x509'
        format: plain
  - name: Business Object
    values:
      - text: ProductionOrder
        format: plain
