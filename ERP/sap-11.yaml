        description: >-
          This indicator determines whether scrap for the component is
          calculated on the basis of the net required quantity (the required
          quantity without assembly scrap from the material master record).  

          You must set this indicator if you want assembly scrap to be
          ignored.You must set this indicator if you enter operation scrap.You
          can set this indicator if you only enter component scrap, to calculate
          scrap on the basis of the net required quantity for the assembly.Bill
          of material:Assembly MAT-1:Required quantity 100 piecesAssembly scrap
          2%Component MAT-2:Component quantity 100 piecesDepending on the
          applicable scrap and the net indicator, the following 6 quantities are
          required for component MAT-2 for a required quantity of 100 pieces of
          MAT-1:1 2 3 4 5 6 Comp 5% - 5% 5% - -Op. 6% 6% - - - -Net ind X X X -
          - 
