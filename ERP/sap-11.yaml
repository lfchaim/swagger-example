      description: >-
        Group multiple requests into a single request payload, see [Batch
        Requests](https://help.sap.com/doc/5890d27be418427993fafa6722cdc03b/Cloud/en-US/OdataV2.pdf#page=152).
      tags:
        - Batch Requests
      consumes:
        - multipart/mixed;boundary=request-separator
      produces:
        - multipart/mixed
      parameters:
        - name: requestBody
          in: body
          description: Batch request
          schema:
            type: string
            example: |-
              --request-separator
              Content-Type: application/http
              Content-Transfer-Encoding: binary

              GET A_ProductionOrderComponent_2 HTTP/1.1
              Accept: application/json


              --request-separator--
      responses:
        '202':
          description: Batch response
          schema:
            type: string
            example: |-
              --response-separator
              Content-Type: application/http

              HTTP/1.1 200 OK
              Content-Type: application/json

              {...}
              --response-separator--
        '400':
          $ref: '#/responses/error'
definitions:
  API_PRODUCTION_ORDER_2_SRV.A_PlannedOrderType:
    type: object
    properties:
      PlannedOrder:
        type: string
        maxLength: 10
        title: Planned Order
        description: Number that specifically identifies a planned order for a material.
      PlannedOrderType:
        type:
          - string
          - 'null'
        maxLength: 4
        example: string
        title: Planned Order Type
        description: >-
          Controls for which order type (for example, standard order, stock
          order) the planned order is provided for.
      Material:
        type:
          - string
          - 'null'
        maxLength: 40
        example: string
        title: Material
        description: |-
          Planning material  
          Number of the material for which the planned order is valid.
      MaterialName:
        type:
          - string
          - 'null'
        maxLength: 40
        example: string
        title: Material Description
        description: >-
          Text containing up to 40 characters that describes the material in
          more detail.  

          You can enter one material description in each of any number of
          languages.In principle, you enter the material description on the data
          screen of the first user department for which you enter data, and in
          your logon language. You can overwrite the material description on the
          Basic Data screen.
      ProductionPlant:
        type:
          - string
          - 'null'
        maxLength: 4
        example: string
        title: Production Plant
        description: >-
          Production Plant in Planned Order  

          Plant in which the order quantity of the internally produced material
          is to be produced according to the planned order.
      MRPPlant:
        type:
          - string
          - 'null'
        maxLength: 4
        example: string
        title: Planning Plant
        description: >-
          Number which clearly identifies the plant where the forecast, MRP or
          long-term planning is carried out.
      MRPArea:
        type:
          - string
          - 'null'
        maxLength: 10
        example: string
        title: MRP Area
        description: >-
          Number of the MRP area for which material requirements planning should
          be carried out separately.
      ProductionVersion:
        type:
          - string
          - 'null'
        maxLength: 4
        example: string
        title: Production Version
        description: >-
          Key which determines the various production techniques according to
          which a material can be manufactured.  

          The production version determines the following:the BOM alternative
          for a BOM explosionthe task list type, the task list group and the
          task list group counter for allocation to task listslot-size
          restrictions for repetitive manufacturing
      MaterialProcurementCategory:
        type:
          - string
          - 'null'
        maxLength: 1
        example: string
        title: Procurement Category
        description: Material Procurement Category
      MaterialProcurementType:
        type:
          - string
          - 'null'
        maxLength: 1
        example: string
        title: Procurement Type
        description: Material Procurement Type
      StorageLocation:
        type:
          - string
          - 'null'
        maxLength: 4
        example: string
        title: Storage Location
      BaseUnit:
        type:
          - string
          - 'null'
        maxLength: 3
        example: string
        title: Base Unit of Measure
        description: >-
          Unit of measure in which stocks of the material are managed. The
          system converts all the quantities you enter in other units of measure
          (alternative units of measure) to the base unit of measure.  

          You define the base unit of measure and also alternative units of
          measure and their conversion factors in the material master
          record.Since all data is updated in the base unit of measure, your
          entry is particularly important for the conversion of alternative
          units of measure. A quantity in the alternative unit of measure can
          only be shown precisely if its value can be shown with the decimal
          places available. To ensure this, please note the following:The base
          unit of measure is the unit satisfying the highest necessary
          requirement for precision.The conversion of alternative units of
          measure to the base unit should result in simple decimal fractions
          (not, for example, 1/3 = 0.333...).Inventory ManagementIn Inventory
          Management, the base unit of measure is the same as the stockkeeping
          unit.ServicesServices have units of measure of their own, including
          the following:Service unitUnit of measure at the higher item level.
          The precise quantities of the individual services are each at the
          detailed service line level.BlanketUnit of measure at service line
          level for services to be provided once only, and for which no precise
          quantities can or are to be specified.
      TotalQuantity:
        type:
          - string
          - 'null'
        format: decimal
        multipleOf: 0.001
        minimum: -9999999999.999
        maximum: 9999999999.999
        example: '0'
        title: Total Order Quantity
        description: |-
          Planned Total Order Quantity  
          Quantity to be produced or ordered according to the planned order.
      PlndOrderPlannedScrapQty:
        type:
          - string
          - 'null'
        format: decimal
        multipleOf: 0.001
        minimum: -9999999999.999
        maximum: 9999999999.999
        example: '0'
        title: Scrap Quantity
        description: >-
          Planned Scrap Quantity  

          Quantity of scrap which is likely to be obtained from the total
          planned order quantity.
      GoodsReceiptQty:
        type:
          - string
          - 'null'
        format: decimal
        multipleOf: 0.001
        minimum: -9999999999.999
        maximum: 9999999999.999
        example: '0'
        title: Quantity Received
        description: |-
          Quantity of Goods Received  
          Indicates the quantity from a goods receipt.
      IssuedQuantity:
        type:
          - string
          - 'null'
        format: decimal
        multipleOf: 0.001
        minimum: -9999999999.999
        maximum: 9999999999.999
        example: '0'
        title: Issued Quantity
        description: Indicates the total quantity of the item that has been issued.
      PlndOrderPlannedStartDate:
        type:
          - string
          - 'null'
        example: /Date(1492041600000)/
        title: Order Start Date
        description: >-
          Planned Order Start Date  

          Earliest date, according to the planned order, that the production of
          the planned order quantity starts.  

          The order start date is transferred from the planned order to the
          production order.For planned orders created by planning runs, the
          system automatically determines the order start date by either forward
          or backward scheduling.
      PlndOrderPlannedStartTime:
        type:
          - string
          - 'null'
        example: PT15H51M04S
        title: Order Start Time
        description: Planned Order Start Time
      PlndOrderPlannedEndDate:
        type:
          - string
          - 'null'
        example: /Date(1492041600000)/
        title: Order End Date
        description: >-
          Planned Order End Date  

          Date, according to the planned order, that you should expect either
          the completion or the delivery of the planned order quantity.
      PlndOrderPlannedEndTime:
        type:
          - string
          - 'null'
        example: PT15H51M04S
        title: Order End Time
        description: Planned Order End Time
      PlannedOrderOpeningDate:
        type:
          - string
          - 'null'
        example: /Date(1492041600000)/
        title: Order Opening Date
        description: |-
          Planned Opening Date in Planned Order  
          Date that the planned order will be opened.
      LastChangeDateTime:
        type:
          - string
          - 'null'
        example: /Date(1492098664000)/
        title: Change Time Stamp
        description: 'Last Change to Planned Order: Time Stamp'
      ProductionStartDate:
        type:
          - string
          - 'null'
        example: /Date(1492041600000)/
        title: Production Start Date
        description: >-
          Start Date for Production  

          The production start date is the planned start date of an order
          excluding the float before production.  

          Production dates are determined during lead time scheduling.
      ProductionEndDate:
        type:
          - string
          - 'null'
        example: /Date(1492041600000)/
        title: Production End Date
        description: >-
          End Date for Production  

          The production finish date is the planned finish date of an order
          excluding the float after production.  

          Production dates are determined during lead time scheduling.
      SalesOrder:
        type:
          - string
          - 'null'
        maxLength: 10
        example: string
        title: Sales Order
        description: Number of the sales order to which the order is to be settled.
      SalesOrderItem:
        type:
          - string
          - 'null'
        maxLength: 6
        example: string
        title: Sales Order Item
        description: Item in the sales order to which the order is to be settled.
      Customer:
        type:
          - string
          - 'null'
        maxLength: 10
        example: string
        title: Customer
        description: >-
          Customer Number  

          Gives an alphanumeric key, which clearly identifies the customer or
          vendor in the SAP system.
      WBSElementInternalID:
        type:
          - string
          - 'null'
        maxLength: 24
        example: string
        title: WBS Element Internal
        description: Work Breakdown Structure Element Internal ID
      WBSElement:
        type:
          - string
          - 'null'
        maxLength: 24
        example: string
        title: WBS Element
        description: Key that identifies a WBS element.
      WBSDescription:
        type:
          - string
          - 'null'
        maxLength: 40
        example: string
        title: WBS Element Name
      AccountAssignmentCategory:
        type:
          - string
          - 'null'
        maxLength: 1
        example: string
        title: Account Assignment Category
      Reservation:
        type:
          - string
          - 'null'
        maxLength: 10
        example: string
        title: Reservation
        description: |-
          Number of Reservation/Dependent Requirement  
          Alphanumeric key uniquely identifying the document.
      MRPController:
        type:
          - string
          - 'null'
        maxLength: 3
        example: string
        title: MRP Controller
      ProductionSupervisor:
        type:
          - string
          - 'null'
        maxLength: 3
        example: string
        title: Production Supervisor
      PurchasingGroup:
        type:
          - string
          - 'null'
        maxLength: 3
        example: string
        title: Purchasing Group
        description: >-
          Key for a buyer or a group of buyers, who is/are responsible for
          certain purchasing activities.  

          Frequently, purchasing documents (such as purchase orders) are
          monitored by the purchasing group. Urging letters (in the case of
          overdue deliveries) fall also within the group's scope of
          activities.For each purchasing group, statistical analyses can be
          performed. The purchasing group can be used as a sort criterion when
          creating purchasing-specific reports.
      PurchasingOrganization:
        type:
          - string
          - 'null'
        maxLength: 4
        example: string
        title: Purch. Organization
        description: |-
          Purchasing Organization  
          Denotes the purchasing organization.
      FixedSupplier:
        type:
          - string
          - 'null'
        maxLength: 10
        example: string
        title: Fixed Supplier
        description: >-
          Number of the vendor defined as the fixed source of supply for this
          purchase requisition.
      PurchasingDocument:
        type:
          - string
          - 'null'
        maxLength: 10
        example: string
        title: Purchase Agreement
        description: Purchase Schedule/Outline Agreement
      PurchasingDocumentItem:
        type:
          - string
          - 'null'
        maxLength: 5
        example: string
        title: Agreement Item
        description: Purchase Schedule/Outline Agreement Item
      QuotaArrangement:
        type:
          - string
          - 'null'
        maxLength: 10
        example: string
        title: Quota Arrangement
      QuotaArrangementItem:
        type:
          - string
          - 'null'
        maxLength: 3
        example: string
        title: Quota Arrangement Item
      SupplierName:
        type:
          - string
          - 'null'
        maxLength: 80
        example: string
        title: Name of Supplier
      PlannedOrderIsFirm:
        type:
          - boolean
          - 'null'
        title: Firming Indicator
        description: >-
          Firming Indicator for Planned Order Data  

          This firming indicator specifies whether the planned order is firm,
          that is, the system will not change either dates or lot sizes during
          planning runs.  

          For manually created planned orders:The indicator is suggested by the
          system when the planned order is created. However, you can remove it
          if desired.For planned orders created by planning runs:The indicator
          is set by the system as soon as you have manually changed a planned
          order. However, you can remove the indicator when you change the
          planned order again.
      PlannedOrderIsConvertible:
        type:
          - boolean
          - 'null'
        title: Conversion Indicator
        description: >-
          Planned Order Conversion Indicator  

          This indicator specifies whether the planned order can be converted
          into a production order or a process order, or into a purchase
          requisition.  

          If the system finds a valid BOM for the planned order and if the
          release of the BOM for the planned order has been activated in the BOM
          status, the system automatically sets the conversion indicator in the
          planned order. If you have not activated the release of the BOM for
          the planned order, the system does not set the conversion indicator.If
          the system cannot find a valid BOM, the coversion indicator is then
          also set, as production orders without BOMs, that is, without
          components, can also be created.You can also set the conversion
          indicator yourself, independent of the BOM status, in the planned
          order.
      PlannedOrderBOMIsFixed:
        type:
          - boolean
          - 'null'
        title: BOM Fixing Indicator
        description: >-
          Fixing Indicator for BOM Explosion  

          Indicates whether the necessary BOM is fixed - that means that it will
          not be re-exploded during another planning run.  

          You can only enter the indicator when creating and changing the
          planned order if the firming indicator is set for the planned order
          data.
      CapacityRequirement:
        type:
          - string
          - 'null'
        maxLength: 12
        example: string
        title: Capacity Requirement
        description: ID of the Capacity Requirements Record
      CapacityRequirementOrigin:
        type:
          - string
          - 'null'
        maxLength: 1
        example: string
        title: Capacity Requirement Origin
      BillOfOperationsType:
        type:
          - string
          - 'null'
        maxLength: 1
        example: string
        title: Task List Type
        description: >-
          Key which classifies task lists according to their functionality.  

          Routings are defined under the following task list
          types:RoutingsReference operation setsMaster recipeGeneral maintenance
          task listEquipment task listInspection planTask list for funct.
          location
      BillOfOperationsGroup:
        type:
          - string
          - 'null'
        maxLength: 8
        example: string
        title: Group
        description: >-
          Key for Task List Group  

          Key identifying a group.  

          You can use groups, for instance, to identify two routings that have
          different production steps for one material.Enter the group to which
          you want to restrict the selection.
      BillOfOperations:
        type:
          - string
          - 'null'
        maxLength: 2
        example: string
        title: Group Counter
        description: >-
          This key and the task list group uniquely identify a task list.  

          In Production Planning and Control, for example, it serves to identify
          alternative production processes in task lists and is used to make a
          distinction between similar task lists.The group counter can be used
          to identify different lot-size ranges, for example.
      LastScheduledDate:
        type:
          - string
          - 'null'
        example: /Date(1492041600000)/
        title: Scheduled on
        description: Date of the Last Scheduling
      ScheduledBasicEndDate:
        type:
          - string
          - 'null'
        example: /Date(1492041600000)/
        title: Scheduled finish
        description: Scheduled finish date
      ScheduledBasicEndTime:
        type:
          - string
          - 'null'
        example: PT15H51M04S
        title: Earliest finish
        description: Earliest finish of operation (time)
      ScheduledBasicStartDate:
        type:
          - string
          - 'null'
        example: /Date(1492041600000)/
        title: Scheduled start
      ScheduledBasicStartTime:
        type:
          - string
          - 'null'
        example: PT15H51M04S
        title: Earliest start time
        description: >-
          Earliest scheduled start: Execution (time)  

          Earliest time at which the execution of the operation or activity (PS)
          can start.
      SchedulingType:
        type:
          - string
          - 'null'
        maxLength: 1
        example: string
        title: Scheduling Type
    title: API Planned Order
