swagger: '2.0'
info:
  title: Production Order (Version 2)
  version: '1'
  description: ' In addition to create, read, and  update, you can also release production  orders and operations. This service also  enables you to schedule production order  operations, technically complete and close  production orders as well as set the  deletion flag and deletion indicator.'
externalDocs:
  description: Business Documentation
  url: >-
