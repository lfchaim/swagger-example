          component to be processed.  

          This entry is used to override the assembly scrap for materials of
          high value.If operation scrap is maintained, you avoid the situation
          whereby too much of the material is planned in MRP for the components
          of subsequent operations.If you make an entry for operation scrap, you
          must also select the operation scrap net indicator (Net field).You can
          find examples of scrap under net scrap.
      BaseUnit:
        type:
