          the material is a component.  

          Component scrap is used in material requirements planning (MRP) to
          determine the quantities of components required. When exploding the
          bill of material (BOM), the system increases the required quantities
          of the components by the calculated scrap quantity.ExampleRequired
          quantity 200 piecesComponent scrap 10%Scrap quantity 20
          piecesTherefore, 220 pieces are required.For examples of calculation
          in connection with the indicator for net scrap, see the documentation
          for this indicator.If there is also assembly scrap for a higher-level
          assembly, the system adds together the two types of scrap.If component
          scrap has been entered in the BOM, this value applies. Otherwise, the
          value specified in the material master record is used.
