openapi: 3.0.0
info:
  version: '1.4'
  title: SAPInvoicingBookings
  description: All interfaces for connecting to SAP Invoicing with Oauth
security:
  - oAuth2Password:
      - read
      - write
paths:
  /accessToken:
    post:
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                grant_type:
                  type: string
                  example: 'client_credentials'
                client_id:
                  type: string
                  format: uuid
                  example: 'RWtlXdCzQO7SKPTKPUqTXeRVeBNtkqKWUMfm'
                client_secret:
                  type: string
                  format: uuid
                  example: '99ae8af9-cf8a-4cb3-89b2-9a42b97762b2'
              required:
                - grant_type
      tags:
        - Authentication

      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthTokenResponse'

  /booking:
    post:
      description: '- Create booking data for invoicing '
      requestBody:
        content:
          application/json: 
            schema:
              $ref: '#/components/schemas/booking'         
      tags:
        - Booking
      responses:
        '200':
          description: Booking Transferred
          content:
            application/json:
              schema:
                type: object
                properties:
                  bookings_id:
                    type: string
                    description: Message description.
                  articles_id:
                    type: string
                    description: Message description.
        '501':
          description: Booking not Transferred due to errors.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
                    
  /InvoiceListing:
    get:
      summary: Search for invoices
      description: 'Get Invoice Listing'
      parameters:
        - name: StartDateTime
          in: query
          description: The start date for the search range (inclusive).
          required: true
          schema:
            type: string
            format: date
            example: '2025-07-17T08:07:59'
        - name: EndDateTime
          in: query
          description: The end date for the search range (inclusive).
          required: true
          schema:
            type: string
            format: date
            example: '2025-07-17T08:07:59'
      tags:
        - Invoice
      responses:
        '200':
          description: 'Invoice Data'
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Invoice'
                  
        '501':
          description: Request not completed due to errors.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
                
  /InvoicePDF:
    get:
      summary: Search for invoices
      description: 'Get Invoice PDF'
      parameters:
        - name: Invoice_number
          in: query
          description: Invoice Number
          required: true
          schema:
            type: string
            example: '400005410'
      tags:
        - Invoice
      responses:
        '200':
          description: 'Invoice PDF'
          content:
            application/json:
              schema:
                type: object
                properties:
                  InvoicePDF:
                    type: string
                    description: Invoice PDF XSTRING
        '501':
          description: Request not completed due to errors.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'



