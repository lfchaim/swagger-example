    AIRBSP: ## "AIRBSP" will be used as the discriminator value
      description: A representation of a AIRBSP
      allOf:  
        - $ref: '#/components/schemas/article'
        - required: 
          - ArticleType
          - Conjunction
          - OBFeeIndicator
          - TicketedAirline
          - BaseAmount
          - BookingCurrency
          - FarePaidAmount
          - LowestOfferredFare
          - SalesPriceAmount
          - StandardFare
          - BookingAgentCode
          - BookingCode
          - BookingMethod
          - IssueDate
          - MainArrival
          - MainBookingClass
          - MainDeparture
          - NumberOfPeople
          - OrderedBy
          - PassengerName
          - QuantityOfProduct
          - RateTypes
          - ReasonCodes
          - Supplier
          - TicketingAgentCode
          - TicketingCode
          - TicketReference
          - ExchangeAmount
          - ExchangeIndicator
          - ExchangeTicketedAirline
          - ExchangeTicketReference
          - UniqueContractId
          - AgencyLicenceNumber
          - BillingType
          - TransactionType
        - type: object
          properties:
            ExchangeAmount:
              type: number
              format: double
              description: Exchange Amount
            ExchangeIndicator:
              type: boolean
              example: true  
              description: Exchange Indicator - true of false
            ExchangeTicketedAirline:
              type: string
              example: LH
              description: Exchange Ticket Airline - IATACODE (2 digit)
              maxLength: 50
            ExchangeTicketReference:
              type: string
              description: Exchange Ticket reference
              maxLength: 20            
            segments:
              allOf:
                - $ref: '#/components/schemas/segment'
                - required:
                  - ArrivalDate
                  - ArrivalDestination
                  - DepartureDate
                  - DeparturePoint
                  - DurationTime
                  - SegmentIdentifier
                  - NumberOfDays
                  - Provider
                  - StatusCode
            taxorsupplement:
              allOf:
                - $ref: '#/components/schemas/taxorsupplement'
                - required:
                  - TaxOrSupplementIdentifier
                  - Amount
            customerreference:
              allOf:
                - $ref: '#/components/schemas/customerreference'
                - required:
                  - Identifier
                  - Value
            creditcard:
              allOf:
                - $ref: '#/components/schemas/creditcard'
                - required:
                  - CredtCardIdentifier
                  - CreditCardType
                  - CreditCardNumber
                  - CreditCardExpiry
                  - CreditCardAmount
