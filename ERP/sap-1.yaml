           [
            E, #Electronic,
            CAW, #Collect at Window,
            CORP, #Corporate Delivery,
            CORPK, #Corporate Kiosk,
            COT, #Collect on Train,
            KIOSK, #Collect at Kiosk,
            MOB, #Mobile,
            NP, #Normal Post,
            PAH, #Print at Home,
            SPECD, #Special Delivery,
            TOD, #Ticket on Departure,
            ]

        TotalAmount:
