        TransactionControlNumber:
          type: string
          description: Transaction control number
          maxLength: 20
        TransactionType:
          type: string
          description: Type of transaction
          enum: [NEW, VOID, REFUND]
          maxLength: 20
        UniqueContractId:
          type: string
          example: 8792
          description: This the unique identifier to find the relevant contract in BRIM
          maxLength: 20
        VoucherNumber:
          type: string
          description: Voucher Number
          maxLength: 50

          
