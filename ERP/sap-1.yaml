          maxLength: 50
        RefundAuthorisation:
          type: string
          description: Refund Authorisation
          maxLength: 20
        SalesPriceAmount:
          type: number
          format: double
          description: Sales Price Amount With the number of decimals of the booking currency
        SecondReferenceFare:
          type: number
          format: double
          description: Second Reference Fare With the number of decimals of the booking currency
        StandardFare:
          type: number
          format: double
          description: Standard Fare With the number of decimals of the booking currency
        ThirdReferenceFare:
          type: number
          format: double
          example: With the number of decimals of the booking currency
          description: Third Reference Fare
        Supplier:
          type: string
          example: 1000
          description: Supplier number
          maxLength: 50
        SupplierAddress:
          type: string
          description: Supplier Address (Hotel, Car, Airsi)
          maxLength: 60
        SupplierCity:
          type: string
