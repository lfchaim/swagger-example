          maxLength: 20
        IssueDate:
          type: string
          format: date-time
          example: 2021-06-05
          description: The date that the ticket was issued
          maxLength: 8
        ITNumber:
          type: string
          description: Inclusive Tour Number
          maxLength: 20
        LowestOfferredFare:
          type: number 
          format: double
          description: Lowest Offered Fare With the number of decimals of the booking currency
        MainArrival:
          type: string
          example: AMS
          description: Main Arrival as IATA airport code
          maxLength: 50
        MainBookingClass:
          type: string
          example: B, Business
          description: Main Booking Class
          maxLength: 20
        MainDeparture:
          type: string
          example: LHR
          description: Main Departure as IATA airport code
          maxLength: 50
        Region:
          type: string
