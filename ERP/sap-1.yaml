  /customer:
    post:
      description: '- Create Customer for invoicing '
      requestBody:
        content:
          application/json: 
            schema:
              $ref: '#/components/schemas/customer'         
      tags:
        - Customer
      responses:
        '200':
          description: Customer Transferred
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    description: Message ID.
                  description:
                    type: string
                    description: Message description.
                  UniqueContractId:
                    type: string
                    description: Contract ID or Technical resource ID
                  BusinessPartner:
                    type: string
                    description: Business Partner Number
        '404':
          description: Customer not transfered
    put:
      description: '- Change Customer for invoicing '
      requestBody:
        content:
          application/json: 
            schema:
              $ref: '#/components/schemas/customer'         
      tags:
        - Customer
      responses:
        '200':
          description: Customer Transferred
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    description: Message ID.
                  description:
                    type: string
                    description: Message description.
                  UniqueContractId:
                    type: string
                    description: Contract ID or Technical resource ID
                  BusinessPartner:
                    type: string
                    description: Business Partner Number
        '404':
          description: Customer not transfered      
servers:
   # Added by API Auto Mocking Plugin
  - description: SwaggerHub API Auto Mocking
    url: https://virtserver.swaggerhub.com/BCD-FSO/SAPInvoicingBookingsAPI

components:
  securitySchemes:
    oAuth2Password:
      type: oauth2
      description: ''
      flows:
        password:
          tokenUrl: https://virtserver.swaggerhub.com/Hybris-FSO/accessToken
          scopes: {}
  schemas:
    OAuthTokenResponse:
      type: object
      # properties:
      #   ... 
      example:
        access_token: NWE4Nzg2ZDEtNzQyMS00ZDViLThjMjctMGQwNjlmZjU5MWNkBGjFElT7CWzl0d
        token_type: bearer
        expires_in: 3600
        # scope: read write
    ErrorResponse:
      type: object
      properties:
        Description:
          type: string
          description: Error Category
        Category:
          type: string
          description: Error Category
        Subcategory:
          type: string
          description: Error Subcategory
        ErrorDescription:
          type: string
          description: Error Description.
        Field:
          type: string
          description: Field that errored (if applicable)
        Value:
          type: string
          description: Value that errored (if applicable)
        Rule:
          type: string
          description: Validation rule that caused error (if applicable)
    
    booking:
      type: object
      required: 
        - BookingReference
      properties:
        booking_reference:
          type: string
          example: FXNA3D
        booking_creation:
          type: string
          format: date-time
          example: 2019-07-21T17:32:28Z
        booking_destination:
          type: string
          example: AMS
          description: Booking destination as IATA airport code
        articles:
          oneOf:
          - $ref: '#/components/schemas/AIRBSP'
          - $ref: '#/components/schemas/EMDBSP'
          - $ref: '#/components/schemas/AIRSI'
          - $ref: '#/components/schemas/EMDSI'
          - $ref: '#/components/schemas/CAR'
          - $ref: '#/components/schemas/HOTEL'
          - $ref: '#/components/schemas/RAIL'
          - $ref: '#/components/schemas/FERRY'
          - $ref: '#/components/schemas/BUS'
          - $ref: '#/components/schemas/CRUISE'
          - $ref: '#/components/schemas/TOUR'
          - $ref: '#/components/schemas/ACP'
          - $ref: '#/components/schemas/ANC'
      description: |
        Booking data for invoice processing
        
    article:
      type: object
      discriminator:
        propertyName: ArticleType
      required: 
        - ArticleType
        - UniqueContractId
      properties:
        twoFOPIndicator:
          type: string
          description: 2 FOP Indicator
          maxLength: 20
        AgencyLicenceNumber:
          type: string
          example: 91251753
          description: IATA/Rail/Other Licence Number
          maxLength: 20
        ArticleType:
          type: string
          description: Type of Article which is booked. 
          enum: [AIRBSP, AIRSI, EMDBSP, EMDSI, CAR, HOTEL, RAIL, FERRY, CRUISE, BUS, TOUR, ACP, ANC]
          maxLength: 20
        BaseAmount:
          type: number
          format: double
          description: The base amount in booking- With the number of decimals of the booking currency currency
        BillingType:
          type: string
          description: Billing type
          enum: [Invoice, Referral, Billback]
          maxLength: 10
        BookingAgentCode:
          type: string
          example: MK
          description: The code of the booking Agent
          maxLength: 20
        BookingCode:
          type: string
          example: 30WR
          description: Psuedo City Code of the Booking
          maxLength: 20
        BookingCurrency:
          type: string
          example: GBP
          description: The Booking currency in ISO 4217 format
          maxLength: 3
        BookingMethod:
          type: string
          description: How booking was made 
          enum: [Low Touch,  No Touch, Manual Touch]
          maxLength: 20
        BookingPlatform:
          type: string
          description: Booking Platform
          enum: [AGENT, MOBILE]
          maxLength: 20
        GDSStatus:
          type: string
          description: GDS Status Code
          enum: [BK, DS, GK, HK, HL, HX, KL, MK, NONGDS, PN, TK, UN, US, YK, KK]
        CarHotelRoomType:
          type: string
          example: Twin Double Room / 4WD Sedan with airco
          description: Car Type/Hotelroom Type
          maxLength: 128
        CommissionAmount:
          type: number
          format: double
          description: The Commision amount in booking Currency With the number of decimals of the booking currency
        CommissionPercentage:
          type: VoucherNumber
          format: double
          description: The Commision percentage in booking Currency in %
        Conjunction:
          type: integer
          format: int64
          description: Number of tickets in conjunction
          enum: [1, 2, 3, 4, 5, 6, 7, 8]
        EInvoiceEmailAddress1:
          type: string
          format: email
          example: getgoing@bcdtravel.com
          description: Email address for sending e-invoice to.
          maxLength: 241
        EInvoiceEmailAddress2:
          type: string
          format: email
          example: getgoing@bcdtravel.com
          description: Second email address for sending e-invoice to.
          maxLength: 241
        EmdTypeIndicator:
          type: string
          description: Indicator showing type of EMD
          maxLength: 20
        FareConstruction:
          type: string
          description: Fare Construction
          maxLength: 400
        FarePaidAmount:
          type: number
          format: double
          description: Fare Paid Amount with the number of decimals of the booking currency
        ForeignTariffIndicator:
          type: string
          description: Foreign TariffIndicator
          maxLength: 20
        HotelChainCode:
          type: string
          example: HL
          description: Hotel Chain Code
          maxLength: 20
        HotelName:
          type: string
          example: HILTON RIYADH HOTEL & RESIDENCES
          description: Hotel Name
          maxLength: 100
        HotelPropertyCode:
          type: string
          example: 3887789
          description: TSH hotel property code
          maxLength: 20
        HotelPropertyCode2:
          type: string
          example: 3887789
          description: TSH hotel property code
          maxLength: 20
        IFareBookingCode:
          type: string
