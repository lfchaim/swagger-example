components:
  schemas:
    SalesOrderResultResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          description: 'Status of the acknowledgment from the receiving application (S for Success, E for Error).'
          enum:
            - S
            - E
          example: S
        message:
          type: string
          description: Optional message regarding the acknowledgment.
          example: Result received successfully.
    GoodsReceiptsResultReq:
      type: object
      properties:
        appId:
          type: string
        returnMessage:
          type: array
          items:
            type: object
            properties:
              appReferenceNo:
                type: string
              status:
                type: string
              message:
                type: string
              documentNumber:
                type: string
              messages:
                type: array
                items:
                  type: object
                  properties:
                    sequence:
                      type: integer
                    messageType:
                      type: string
                    message:
                      type: string
                    messageV1:
                      type: string
                    messageV2:
                      type: string
                    messageV3:
                      type: string
                    messageV4:
                      type: string
      x-examples:
        Example 1:
          appId: TOMS-KETSH-01
          returnMessage:
            - appReferenceNo: GI-2400002
              status: ''
              message: ''
              documentNumber: ''
              messages:
                - sequence: 1
                  messageType: ''
                  message: .
                  messageV1: ''
                  messageV2: ''
                  messageV3: ''
                  messageV4: ''
    GMVT-CancelResultReq:
      type: object
      properties:
        returnData:
          type: array
          items:
            type: object
            properties:
              status:
                type: string
              requestRef:
                type: string
              docNo:
                type: string
              docYear:
                type: integer
              msgReturn:
                type: array
                items:
                  type: object
                  properties:
                    message:
                      type: string
      x-examples:
        Example 1:
          returnData:
            - status: E
              requestRef: CC-000001
              docNo: ''
              docYear: 0
              msgReturn:
                - message: Matdoc no is initial
                - message: Matdoc year is initial
                - message: 'Matdoc year is initial,Matdoc no is initial ,Matdoc year is initial'
    GMVT-CancelResp:
      type: object
      properties:
        message:
          type: string
        result:
          type: object
          properties:
            success:
              type: boolean
            message:
              type: string
        status:
          type: integer
        code:
          type: string
        traceLogCode:
          type: string
      x-examples:
        Example 1:
          message: success
          result:
            success: true
            message: Transaction Incomplete!
          status: 1
          code: ''
          traceLogCode: HXF2DUKO
