openapi: 3.0.0
info:
  title: 'API Documentations (ERP Module: ERP Documentation)'
  version: 1.1.13
  description: API documentation for ERP Documentation.
  termsOfService: https://punjabcashandcarry.com.pk:8088/api-docs/erp-documentation
  contact:
    name: Software Technologies Support
    email: support@softwaretechnologies.com.pk
    url: https://punjabcashandcarry.com.pk:8088/api-docs/erp-documentation
  license:
    name: Software Technologies Proprietary License
    url: https://punjabcashandcarry.com.pk:8088/api-docs/erp-documentation
servers:
  - url: https://punjabcashandcarry.com.pk:8088/api
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Enter your JWT token
  responses:
    UnauthorizedError:
      description: Authentication failed due to missing, invalid, or expired token.
      content:
        application/json:
          schema:
            type: object
            properties:
              status:
                type: object
                properties:
                  code:
                    type: integer
                    example: 99
                  message:
                    type: string
                    example: Failed to authenticate token
              result:
                type: array
                items:
                  type: string
                example: []
  schemas:
    VoucherTemplateMaster:
      type: object
      description: Complete voucher template master with all associated fields and formulas
      properties:
        VoucherTemplateMasterId:
          type: integer
          description: '[Auto-Generated] Unique system identifier for this template record'
          example: 1
        VoucherTemplateMasterName:
          type: string
          description: >-
            [Required] Business name for the template (e.g., "Monthly Sales
            Invoice Template")
          example: Standard Sales Invoice Template
        VoucherTemplateMasterCode:
          type: string
          description: '[Optional]'
          example: SIT001
        VoucherTemplateMasterDescription:
          type: string
          description: >-
            [Optional] Detailed description of template purpose and usage
            instructions
          example: >-
            Standard template for processing customer sales invoices with
            automatic tax calculations
        VoucherTemplateMasterVoucherTemplateMainId:
          type: integer
          description: >-
            [Required] Reference to main template configuration defining overall
            structure
          example: 1
        VoucherTemplateMasterVoucherTypeId:
          type: integer
          description: >-
            [Required] Voucher type ID from VoucherType table that this template
            applies to
          example: 1
        VoucherTemplateMasterType:
          type: string
          enum:
            - I
            - O
            - G
          description: >-
            [Required] Template category: I=Inflow transactions, O=Outflow
            transactions, G=Gatepass
          example: I
        VoucherTemplateMasterIsSelectableColumns:
          type: integer
          description: >-
            [Optional] Column customization: 1=Users can show/hide columns,
            0=Fixed layout (default: 0)
          example: 1
          enum:
            - 0
            - 1
        VoucherTemplateMasterIsActive:
          type: integer
          description: >-
            [Optional] Availability status: 1=Available for use, 0=Disabled
            (default: 1)
          example: 1
          enum:
            - 0
            - 1
        VoucherTemplateMasterAddBy:
          type: integer
          description: '[System] User ID who created this record'
          example: 1
        VoucherTemplateMasterAddTime:
          type: string
          format: date-time
          description: '[System] Creation timestamp'
          example: '2024-01-01T10:00:00Z'
        VoucherTemplateMasterEditBy:
          type: integer
          description: '[System] User ID who last modified this record'
          example: 1
        VoucherTemplateMasterEditTime:
          type: string
          format: date-time
          description: '[System] Last modification timestamp'
          example: '2024-01-01T10:00:00Z'
        VoucherTemplateMain:
          $ref: '#/components/schemas/VoucherTemplateMain'
          description: Main template configuration details
        VoucherType:
          $ref: '#/components/schemas/VoucherType'
          description: Voucher type details
        Fields:
          type: array
          description: Collection of field definitions that make up this template structure
          items:
            $ref: '#/components/schemas/VoucherTemplateMasterField'
      required:
        - VoucherTemplateMasterName
        - VoucherTemplateMasterVoucherTemplateMainId
        - VoucherTemplateMasterVoucherTypeId
        - VoucherTemplateMasterType
    VoucherTemplateMain:
      type: object
      description: Main template configuration that defines the overall structure
      properties:
        VoucherTemplateMainId:
          type: integer
          description: Unique identifier for the main template
          example: 1
        VoucherTemplateMainName:
          type: string
          description: Name of the main template configuration
          example: Standard Invoice Layout
        VoucherTemplateMainDescription:
          type: string
          description: Description of the main template purpose
          example: Standard layout for all invoice types
        VoucherTemplateMainIsActive:
          type: integer
          description: 'Active status: 1=Active, 0=Inactive'
          example: 1
          enum:
            - 0
            - 1
    VoucherType:
      type: object
      description: Voucher type definition
      properties:
        VoucherTypeId:
          type: integer
          description: Unique identifier for the voucher type
          example: 1
        VoucherTypeName:
          type: string
          description: Name of the voucher type
          example: Sales Voucher
        VoucherTypeCode:
          type: string
          description: Short code for the voucher type
          example: SV
        VoucherTypeDescription:
          type: string
          description: Detailed description of the voucher type
          example: Used for recording customer sales transactions
    VoucherTemplateMasterField:
      type: object
      description: Individual field definition within a voucher template
      properties:
        VoucherTemplateMasterFieldId:
          type: integer
          description: '[Auto-Generated] Unique identifier for this field'
          example: 1
        VoucherTemplateMasterFieldCode:
          type: string
          description: '[Optional] Unique code identifier for this field'
          example: CUST_001
          maxLength: 10
        VoucherTemplateMasterFieldNameFormula:
          type: string
          description: '[Optional] Formula name for calculations'
          example: SUM(Amount)
          maxLength: 512
        VoucherTemplateMasterFieldIsShowDropdown:
          type: integer
          description: '[Optional] Show dropdown control: 1=Yes, 0=No (default: 0)'
          example: 0
          enum:
            - 0
            - 1
        VoucherTemplateMasterFieldIsShowTotal:
          type: integer
          description: '[Optional] Display total for this field: 1=Yes, 0=No (default: 0)'
          example: 1
          enum:
            - 0
            - 1
        VoucherTemplateMasterFieldTaxFormulaId:
          type: integer
          description: '[Optional] Direct reference to tax formula ID'
          example: 1
        VoucherTemplateMasterFieldTypeId:
          type: integer
          description: 'Type of field: 1=Number, 2=Text, 3=Date, 4=Boolean, 5=Time, etc.'
          example: 1
          enum:
            - 1
            - 2
            - 3
            - 4
            - 5
        VoucherTemplateMasterFieldVoucherTemplateMasterId:
          type: integer
          description: '[System] Reference to parent template master'
          example: 1
        VoucherTemplateMasterFieldIsHeader:
          type: integer
          description: '[Required] 1 = Voucher''s Header field, 0 = Voucher''s Detail field'
          example: 1
          enum:
            - 0
            - 1
        VoucherTemplateMasterFieldName:
          type: string
          description: >-
            [Required] MasterFieldTableFieldName from MasterField model that
            this field is based on
          example: CustomerName
        VoucherTemplateMasterFieldNameTotal:
          type: string
          description: '[Optional] Total field name for this field (e.g., "Total Amount")'
          example: TotalAmount
        VoucherTemplateMasterFieldCaption:
          type: string
          description: '[Required] User-friendly label displayed in the interface'
          example: Customer Name
        VoucherTemplateMasterFieldValue:
          type: string
          description: MasterFieldName from MasterField model
          example: Customer.CustomerName
        VoucherTemplateMasterFieldFraction:
          type: string
          description: >-
            [Optional] Number of decimal places for numeric fields (e.g., "2"
            for currency amounts)
          example: '2'
        VoucherTemplateMasterFieldIsRequired:
          type: integer
          description: >-
            [Optional] Validation rule: 1=Requires user input, 0=Optional
            (default: 0)
          example: 1
          enum:
            - 0
            - 1
        VoucherTemplateMasterFieldIsReadOnly:
          type: integer
          description: >-
            [Optional] Edit permission: 1=Prevents user modification, 0=Allows
            editing (default: 0)
          example: 0
          enum:
            - 0
            - 1
        VoucherTemplateMasterFieldIsActive:
          type: integer
          description: >-
            [Optional] Field availability: 1=Available for use, 0=Hidden
            (default: 1)
          example: 1
          enum:
            - 0
            - 1
        VoucherTemplateMasterFieldIsVisible:
          type: integer
          description: >-
            [Optional] Display visibility: 1=Visible in UI, 0=Hidden (default:
            1)
          example: 1
          enum:
            - 0
            - 1
        VoucherTemplateMasterFieldSortId:
          type: integer
          description: >-
            [Optional] Display order sequence number (lower numbers appear
            first)
          example: 1
        VoucherTemplateMasterFieldControlInputId:
          type: string
          description: HTML control input identifier
          maxLength: 100
        VoucherTemplateMasterFieldIsManage:
          type: integer
          description: >-
            [Optional] Indicates if this field is to be showwn in manage form:
            1=Yes, 0=No (default: 0)
          example: 0
          enum:
            - 0
            - 1
        VoucherTemplateMasterFieldWidth:
          type: string
          description: '[Optional] Column width in pixels or percentage'
          example: 200px
        VoucherTemplateMasterFieldHeaderRowStyle:
          type: string
          description: CSS styling for header row
          maxLength: 200
        VoucherTemplateMasterFieldDataRowStyle:
          type: string
          description: CSS styling for data rows
          maxLength: 200
        VoucherTemplateMasterFieldHeaderAlign:
          type: string
          description: Header text alignment
          example: left
          enum:
            - left
            - center
            - right
        VoucherTemplateMasterFieldAlign:
          type: string
          description: '[Optional] Text alignment: left, center, right'
          example: left
          enum:
            - left
            - center
            - right
        VoucherTemplateMasterFieldAddBy:
          type: integer
          description: '[System] User ID who created this field'
          example: 1
        VoucherTemplateMasterFieldAddTime:
          type: string
          format: date-time
          description: '[System] Field creation timestamp'
          example: '2024-01-01T10:00:00Z'
        VoucherTemplateMasterFieldEditBy:
          type: integer
          description: '[System] User ID who last modified this field'
          example: 1
        VoucherTemplateMasterFieldEditTime:
          type: string
          format: date-time
          description: '[System] Field last modification timestamp'
          example: '2024-01-01T10:00:00Z'
        MasterField:
          $ref: '#/components/schemas/MasterField'
          description: >-
            Master field definition if this field is based on a predefined
            master field
        Formulas:
          type: array
          description: >-
            List of tax formulas applied to this field for automatic
            calculations
          items:
            $ref: '#/components/schemas/VoucherTemplateMasterFieldFormula'
        FormulaIds:
          type: array
          description: Array of tax formula IDs to apply calculations to this field
          items:
            type: integer
          example:
            - 1
            - 2
            - 3
      required:
        - VoucherTemplateMasterFieldName
        - VoucherTemplateMasterFieldCaption
        - VoucherTemplateMasterFieldTypeId
        - VoucherTemplateMasterFieldIsHeader
    MasterField:
      type: object
      description: >-
        Predefined field template that can be reused across multiple voucher
        templates
      properties:
        MasterFieldId:
          type: integer
          description: Unique identifier for the master field
          example: 1
        MasterFieldName:
          type: string
          description: Internal name of the master field
          example: CustomerName
        MasterFieldDisplayName:
          type: string
          description: Display name for the master field
          example: Customer Name
        MasterFieldType:
          type: string
          description: 'Type of the master field:  I=Inflow, O=Outflow, G=Gatepass'
          example: I
          enum:
            - I
            - O
            - G
        MasterFieldHeaderDetail:
          type: string
          description: Header or detail section this field belongs to
          example: H
          enum:
            - H
            - D
        MasterFieldDescription:
          type: string
          description: Description of the master field purpose
          example: Standard customer name field for invoices
        MasterFieldIsActive:
          type: integer
          description: 'Active status: 1=Active, 0=Inactive'
          example: 1
          enum:
            - 0
            - 1
    VoucherTemplateMasterFieldFormula:
      type: object
      description: Formula association linking a field with tax calculation formulas
      properties:
        VoucherTemplateMasterFieldFormulaId:
          type: integer
          description: Unique identifier for this field-formula association
          example: 1
        VoucherTemplateMasterFieldFormulaVoucherTemplateMasterFieldId:
          type: integer
          description: >-
            Associated voucher template master field ID, Reference to the field
            this formula applies to
          example: 1
        VoucherTemplateMasterFieldFormulaTaxFormulaId:
          type: integer
          description: Reference to the tax formula to apply
          example: 1
        VoucherTemplateMasterFieldFormulaIsActive:
          type: integer
          description: 'Active status: 1=Active, 0=Inactive'
          example: 1
          enum:
            - 0
            - 1
        TaxFormula:
          $ref: '#/components/schemas/TaxFormula'
          description: Tax formula details
    TaxFormula:
      type: object
      description: Tax calculation formula definition
      properties:
        TaxFormulaId:
          type: integer
          description: Unique identifier for the tax formula
          example: 1
        TaxFormulaTaxType:
          type: string
          description: MasterFieldName from MasterField table that this formula applies to
          example: Item_Code
        TaxFormulaName:
          type: string
          description: Name of the tax formula
          example: Standard Sales Tax
        TaxFormulaCode:
          type: string
          description: Short code for the tax formula
          example: SST
        TaxFormulaDescription:
          type: string
          description: Detailed description of what this formula calculates
          example: Calculates 17% sales tax on taxable amount
        TaxFormulaValue:
          type: string
          description: Mathematical expression for tax calculation
          example: Amount * 0.17
        TaxFormulaIsFunction:
          type: integer
          description: 'Indicates if this formula is a function: 1=Yes, 0=No'
          example: 0
          enum:
            - 0
            - 1
        TaxFormulaFunction:
          type: string
          description: Tax calculation function/script
        TaxFormulaType:
          type: string
          description: 'Type of the master field:  I=Inflow, O=Outflow, G=Gatepass'
          example: I
          enum:
            - I
            - O
            - G
        TaxFormulaIsActive:
          type: integer
          description: 'Active status: 1=Active, 0=Inactive'
          example: 1
          enum:
            - 0
            - 1
    VoucherTemplateMasterInput:
      type: object
      description: Schema for creating a new voucher template master
      properties:
        VoucherTemplateMasterName:
          type: string
          description: Template name
          example: Standard Sales Invoice Template
        VoucherTemplateMasterCode:
          type: string
          description: (optional)
          example: SIT001
        VoucherTemplateMasterDescription:
          type: string
          description: Detailed description of template purpose
          example: Standard template for processing customer sales invoices
        VoucherTemplateMasterVoucherTemplateMainId:
          type: integer
          description: Reference to main template ID from VoucherTemplateMain model
          example: 1
        VoucherTemplateMasterVoucherTypeId:
          type: integer
          description: Voucher type ID this template applies to from VoucherType model
          example: 1
        VoucherTemplateMasterType:
          type: string
          enum:
            - I
            - O
            - G
          description: 'Template category: I=Inflow, O=Outflow, G=Gatepass'
          example: I
        VoucherTemplateMasterIsSelectableColumns:
          type: integer
          description: 'Allow column customization: 1=Yes, 0=No'
          example: 1
          enum:
            - 0
            - 1
        VoucherTemplateMasterIsActive:
          type: integer
          description: 'Template availability: 1=Active, 0=Inactive'
          example: 1
          enum:
            - 0
            - 1
        Fields:
          type: array
          description: Array of field definitions for this template
          items:
            $ref: '#/components/schemas/VoucherTemplateMasterFieldInput'
      required:
        - VoucherTemplateMasterName
        - VoucherTemplateMasterVoucherTemplateMainId
        - VoucherTemplateMasterVoucherTypeId
        - VoucherTemplateMasterType
    VoucherTemplateMasterFieldInput:
      type: object
      description: Schema for creating a new field within a voucher template
      properties:
        VoucherTemplateMasterFieldTypeId:
          type: integer
          description: 'Type of field: 1=Number, 2=Text, 3=Date, 4=Boolean, 5=Time, etc.'
          example: 1
          enum:
            - 1
            - 2
            - 3
            - 4
            - 5
        VoucherTemplateMasterFieldVoucherTemplateMasterId:
          type: integer
          description: '[System] Reference to parent template master'
          example: 1
        VoucherTemplateMasterFieldIsHeader:
          type: integer
          description: '[Required] 1 = Voucher''s Header field, 0 = Voucher''s Detail field'
          example: 1
          enum:
            - 0
            - 1
        VoucherTemplateMasterFieldName:
          type: string
          description: >-
            [Required] MasterFieldTableFieldName from MasterField model that
            this field is based on
          example: CustomerName
        VoucherTemplateMasterFieldNameTotal:
          type: string
          description: '[Optional] Total field name for this field (e.g., "Total Amount")'
          example: TotalAmount
        VoucherTemplateMasterFieldCaption:
          type: string
          description: '[Required] User-friendly label displayed in the interface'
          example: Customer Name
        VoucherTemplateMasterFieldValue:
          type: string
          description: MasterFieldName from MasterField model
          example: Customer.CustomerName
        VoucherTemplateMasterFieldFraction:
          type: string
          description: >-
            [Optional] Number of decimal places for numeric fields (e.g., "2"
            for currency amounts)
          example: '2'
        VoucherTemplateMasterFieldIsRequired:
          type: integer
          description: >-
            [Optional] Validation rule: 1=Requires user input, 0=Optional
            (default: 0)
          example: 1
          enum:
            - 0
            - 1
        VoucherTemplateMasterFieldIsReadOnly:
          type: integer
          description: >-
            [Optional] Edit permission: 1=Prevents user modification, 0=Allows
            editing (default: 0)
          example: 0
          enum:
            - 0
            - 1
        VoucherTemplateMasterFieldIsActive:
          type: integer
          description: >-
            [Optional] Field availability: 1=Available for use, 0=Hidden
            (default: 1)
          example: 1
          enum:
            - 0
            - 1
        VoucherTemplateMasterFieldIsVisible:
          type: integer
          description: >-
            [Optional] Display visibility: 1=Visible in UI, 0=Hidden (default:
            1)
          example: 1
          enum:
            - 0
            - 1
        VoucherTemplateMasterFieldSortId:
          type: integer
          description: >-
            [Optional] Display order sequence number (lower numbers appear
            first)
          example: 1
        VoucherTemplateMasterFieldControlInputId:
          type: string
          description: HTML control input identifier
          maxLength: 100
        VoucherTemplateMasterFieldIsManage:
          type: integer
          description: >-
            [Optional] Indicates if this field is to be showwn in manage form:
            1=Yes, 0=No (default: 0)
          example: 0
          enum:
            - 0
            - 1
        VoucherTemplateMasterFieldWidth:
          type: string
          description: '[Optional] Column width in pixels or percentage'
          example: 200px
        VoucherTemplateMasterFieldHeaderRowStyle:
          type: string
          description: CSS styling for header row
          maxLength: 200
        VoucherTemplateMasterFieldDataRowStyle:
          type: string
          description: CSS styling for data rows
          maxLength: 200
        VoucherTemplateMasterFieldHeaderAlign:
          type: string
          description: Header text alignment
          example: left
          enum:
            - left
            - center
            - right
        VoucherTemplateMasterFieldAlign:
          type: string
          description: '[Optional] Text alignment: left, center, right'
          example: left
          enum:
            - left
            - center
            - right
        VoucherTemplateMasterFieldAddBy:
          type: integer
          description: '[System] User ID who created this field'
          example: 1
        VoucherTemplateMasterFieldAddTime:
          type: string
          format: date-time
          description: '[System] Field creation timestamp'
          example: '2024-01-01T10:00:00Z'
        VoucherTemplateMasterFieldEditBy:
          type: integer
          description: '[System] User ID who last modified this field'
          example: 1
        VoucherTemplateMasterFieldEditTime:
          type: string
          format: date-time
          description: '[System] Field last modification timestamp'
          example: '2024-01-01T10:00:00Z'
        FormulaIds:
          type: array
          description: Array of tax formula IDs to apply to this field
          items:
            type: integer
          example:
            - 1
            - 2
      required:
        - VoucherTemplateMasterFieldName
        - VoucherTemplateMasterFieldCaption
        - VoucherTemplateMasterFieldTypeId
        - VoucherTemplateMasterFieldIsHeader
    CloneRecordInput:
      type: object
      description: Schema for cloning an existing voucher template master
      properties:
        id:
          type: integer
          description: ID of the VoucherTemplateMaster to clone
          example: 1
        vTypeId:
          type: integer
          description: Target voucher type ID for the cloned template
          example: 2
        voucherTemplateMainId:
          type: integer
          description: Voucher template main ID for the cloned template
          example: 1
      required:
        - id
        - vTypeId
        - voucherTemplateMainId
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          description: The email of the user attempting to log in.
          example: user@example.com
        password:
          type: string
          description: The password of the user attempting to log in.
          example: P@ssw0rd
    LoginResponse:
      type: object
      properties:
        token:
          type: string
          description: The authentication token for the user.
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        isAuthenticated:
          type: boolean
          description: Indicates if the user is authenticated.
          example: true
    ErrorResponse:
      type: object
      properties:
        statusCode:
          type: integer
          description: Status code indicating the type of error.
          example: 1
        message:
          type: string
          description: Error message detailing the issue.
          example: Email is required
    BlockedAccountResponse:
      type: object
      properties:
        statusCode:
          type: integer
          description: Status code indicating the type of error.
          example: 23
        message:
          type: string
          description: Error message explaining the block.
          example: Account is Blocked
