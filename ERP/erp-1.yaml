  /UOMGroup/insert:
    post:
      summary: Create a new UOM Group with line items
      tags:
        - UOMGroup
      description: >-
        Creates a new Unit of Measurement Group along with its associated UOM
        line items. This endpoint handles transactional creation of both the
        main UOM Group record and its related UOM conversion entries.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - UOMGroupCode
                - UOMGroupName
                - UOMGroupBaseUOMId
                - UOMGroupUOMs
              properties:
                UOMGroupCode:
                  type: string
                  maxLength: 20
                  description: Unique code for the UOM Group
                  example: WEIGHT01
                UOMGroupName:
                  type: string
                  maxLength: 20
                  description: Name of the UOM Group
                  example: Weight Units
                UOMGroupDescription:
                  type: string
                  maxLength: 50
                  description: Detailed description of the UOM Group
                  example: Group containing weight-related units of measurement
                UOMGroupBaseUOMId:
                  type: integer
                  description: ID of the base Unit of Measurement
                  example: 1
                UOMGroupIsActive:
                  type: integer
                  enum:
                    - 0
                    - 1
                  description: Active status (0 = inactive, 1 = active)
                  example: 1
                UOMGroupUOMs:
                  type: array
                  description: Array of UOM conversion entries for this group
                  items:
                    type: object
                    required:
                      - UOMGroupUOMUOMId
                      - UOMGroupUOMUOMQTY
                      - UOMGroupUOMBaseUOMQTY
                      - UOMGroupUOMBaseUOMId
                    properties:
                      UOMGroupUOMUOMId:
                        type: integer
                        description: ID of the UOM being converted
                        example: 2
                      UOMGroupUOMUOMQTY:
                        type: number
                        format: decimal
                        description: Quantity in the target UOM
                        example: 1000
                      UOMGroupUOMBaseUOMId:
                        type: integer
                        description: ID of the base UOM for conversion
                        example: 1
                      UOMGroupUOMBaseUOMQTY:
                        type: number
                        format: decimal
                        description: Quantity in the base UOM
                        example: 1
                      UOMGroupUOMIsActive:
                        type: integer
                        enum:
                          - 0
                          - 1
                        description: Active status for this UOM conversion
                        example: 1
                  example:
                    - UOMGroupUOMUOMId: 2
                      UOMGroupUOMUOMQTY: 1000
                      UOMGroupUOMBaseUOMId: 1
                      UOMGroupUOMBaseUOMQTY: 1
                      UOMGroupUOMIsActive: 1
                    - UOMGroupUOMUOMId: 3
                      UOMGroupUOMUOMQTY: 1
                      UOMGroupUOMBaseUOMId: 1
                      UOMGroupUOMBaseUOMQTY: 1000
                      UOMGroupUOMIsActive: 1
            example:
              UOMGroupCode: WEIGHT01
              UOMGroupName: Weight Units
              UOMGroupDescription: Group containing weight-related units of measurement
              UOMGroupBaseUOMId: 1
              UOMGroupIsActive: 1
              UOMGroupUOMs:
                - UOMGroupUOMUOMId: 2
                  UOMGroupUOMUOMQTY: 1000
                  UOMGroupUOMBaseUOMId: 1
                  UOMGroupUOMBaseUOMQTY: 1
                  UOMGroupUOMIsActive: 1
      responses:
        '200':
          description: UOM Group created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: object
                    properties:
                      code:
                        type: integer
                        example: 0
                      message:
                        type: string
                        example: item
                  result:
                    type: object
                    properties:
                      UOMGroupId:
                        type: integer
                        example: 123
                      UOMGroupCode:
                        type: string
                        example: WEIGHT01
                      UOMGroupName:
                        type: string
                        example: Weight Units
                      UOMGroupDescription:
                        type: string
                        example: Group containing weight-related units of measurement
                      UOMGroupBaseUOMId:
                        type: integer
                        example: 1
                      UOMGroupIsActive:
                        type: integer
                        example: 1
                      UOMGroupAddBy:
                        type: integer
                        example: 456
                      UOMGroupAddTime:
                        type: string
                        format: date-time
                        example: '2024-01-15T10:30:00.000Z'
                      BaseUOM:
                        type: object
                        properties:
