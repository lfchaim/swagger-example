                  type: integer
                  description: The Sales Voucher ID related to the points (optional).
                  example: 456
                CustomerPointLedgerBillNo:
                  type: string
                  description: The bill number related to the points (optional).
                  example: INV123
      responses:
        '200':
          description: Points successfully spent.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    example: 0
                  message:
                    type: string
                    example: Points spent successfully
                  data:
                    type: object
                    properties:
                      CustomerPointLedgerId:
                        type: integer
                        example: 789
                      CustomerPointLedgerPoints:
                        type: integer
                        example: -50
                      CustomerPointLedgerBalance:
                        type: integer
                        example: 450
        '400':
          description: Validation error, insufficient points, or missing fields.
        '404':
          description: Customer not found.
        '500':
          description: Internal server error.
  /Customer/getLedgerPoints:
    post:
      summary: Get customer ledger points
      description: Fetches the ledger entries for a customer within a specified date range.
      tags:
        - Customer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                CustomerId:
                  type: integer
                  description: The unique ID of the customer.
                  example: 123
                fromDate:
                  type: string
                  format: date
                  description: The start date for the ledger entries.
                  example: '2024-11-01'
                toDate:
                  type: string
                  format: date
                  description: The end date for the ledger entries.
                  example: '2024-11-30'
      responses:
        '200':
          description: Ledger entries successfully retrieved.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    example: 0
                  message:
                    type: string
                    example: Ledger retrieved successfully
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        CustomerPointLedgerId:
                          type: integer
                          example: 789
                        CustomerPointLedgerPoints:
                          type: integer
                          example: 100
                        CustomerPointLedgerBalance:
                          type: integer
                          example: 500
                        CustomerPointLedgerDate:
                          type: string
                          format: date
                          example: '2024-11-01'
        '400':
          description: Validation error or missing fields.
        '500':
          description: Internal server error.
