  /SystemKey/getAllLL:
    post:
      summary: Retrieve all records with lazy loading
      tags:
        - System Key
      description: >-
        Fetches a paginated list of records based on filters, sorting, and lazy
        loading events.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                LazyLoadEvent:
                  type: object
                  description: >-
                    Lazy loading parameters for pagination, sorting, and
                    aggregation.
                  properties:
                    first:
                      type: integer
                      description: Offset for paginated results.
                      example: 0
                    rows:
                      type: integer
                      description: Number of records to fetch per page.
                      example: 10
                    sumAttributes:
                      type: array
                      items:
                        type: object
                        properties:
                          colType:
                            type: string
                            description: >-
                              Type of column aggregation (e.g.,
                              "sumWithLiteral").
                            example: sumWithLiteral
                          value:
                            type: string
                            description: The column or literal value to sum.
                            example: columnName
                          label:
                            type: string
                            description: Label for the aggregated result.
                            example: TotalColumn
                      description: Attributes to aggregate using SUM.
                Where:
                  type: object
                  description: Filtering criteria for the query.
                  example:
                    SystemKeyId:
                      $gte: '%value%'
                    SystemKeySystemUserId:
                      $like: '%value%'
                attributes:
                  type: array
                  items:
                    type: string
                  description: Specific attributes to fetch for each record.
                  example:
                    - SystemKeyId
                    - SystemKeySystemUserId
                    - SystemKeyLocationId
                SortOrder:
                  type: array
                  items:
                    type: string
                  description: Sorting criteria for the records.
                  example:
                    - - SystemKeyId
                      - ASC
      responses:
        '200':
          description: Success - Paginated list of records
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: object
                    properties:
                      code:
                        type: integer
                        example: 0
                      message:
                        type: string
                        example: List
                      resultCount:
                        type: integer
                        example: 10
                      paginationData:
                        type: object
                        properties:
                          totalRecords:
                            type: integer
                            example: 100
                          recordFetched:
                            type: integer
                            example: 10
                          recordLimit:
                            type: integer
                            example: 10
                          recordOffset:
                            type: integer
                            example: 0
                  result:
                    type: array
                    items:
                      type: object
                      properties:
                        SystemKeyId:
                          type: number
                          example: 1
                        SystemKeySystemUserId:
                          type: number
                          example: 1
                        SystemKeyLocationId:
                          type: number
                          example: 1
        '400':
          description: Bad Request - Invalid parameters
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: object
                    properties:
                      code:
                        type: integer
                        example: 1
                      message:
                        type: string
                        example: Invalid parameters
                  result:
                    type: array
                    items:
                      type: string
                    example: []
        '404':
          description: No records found
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: object
                    properties:
                      code:
                        type: integer
                        example: 0
                      message:
                        type: string
                        example: No records found
                  result:
                    type: array
                    items:
                      type: string
                    example: []
