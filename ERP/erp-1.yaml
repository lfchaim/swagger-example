        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                LazyLoadEvent:
                  type: object
                  description: >-
                    Lazy loading parameters for pagination, sorting, and
                    aggregation.
                  properties:
                    first:
                      type: integer
                      description: Offset for paginated results.
                      example: 0
