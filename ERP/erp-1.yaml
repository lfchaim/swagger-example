  /UOM/getAllLL:
    post:
      summary: Retrieve all records with lazy loading
      tags:
        - UOM
      description: >-
        Fetches a paginated list of records based on filters, sorting, and lazy
        loading events.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                LazyLoadEvent:
                  type: object
                  description: >-
                    Lazy loading parameters for pagination, sorting, and
                    aggregation.
                  properties:
                    first:
                      type: integer
                      description: Offset for paginated results.
                      example: 0
                    rows:
                      type: integer
                      description: Number of records to fetch per page.
                      example: 10
                    sumAttributes:
                      type: array
                      items:
                        type: object
                        properties:
                          colType:
                            type: string
                            description: >-
                              Type of column aggregation (e.g.,
                              "sumWithLiteral").
                            example: sumWithLiteral
                          value:
                            type: string
                            description: The column or literal value to sum.
                            example: columnName
                          label:
                            type: string
                            description: Label for the aggregated result.
                            example: TotalColumn
                      description: Attributes to aggregate using SUM.
                Where:
                  type: object
                  description: Filtering criteria for the query.
                  example:
                    UOMId:
                      $gte: '%value%'
                    UOMCode:
                      $like: '%value%'
                attributes:
                  type: array
                  items:
                    type: string
                  description: Specific attributes to fetch for each record.
                  example:
                    - UOMId
                    - UOMCode
                    - UOMName
                SortOrder:
                  type: array
                  items:
                    type: string
                  description: Sorting criteria for the records.
                  example:
                    - - UOMId
                      - ASC
      responses:
        '200':
          description: Success - Paginated list of records
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: object
                    properties:
                      code:
                        type: integer
                        example: 0
                      message:
                        type: string
                        example: List
                      resultCount:
                        type: integer
                        example: 10
                      paginationData:
                        type: object
                        properties:
                          totalRecords:
                            type: integer
                            example: 100
                          recordFetched:
                            type: integer
                            example: 10
                          recordLimit:
                            type: integer
                            example: 10
                          recordOffset:
                            type: integer
                            example: 0
                  result:
                    type: array
                    items:
                      type: object
                      properties:
                        UOMId:
                          type: number
                          example: 1
                        UOMCode:
                          type: string
                          example: string
                        UOMName:
                          type: string
                          example: string
        '400':
          description: Bad Request - Invalid parameters
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: object
                    properties:
                      code:
                        type: integer
                        example: 1
                      message:
                        type: string
                        example: Invalid parameters
                  result:
                    type: array
                    items:
                      type: string
                    example: []
        '404':
          description: No records found
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: object
                    properties:
                      code:
