  /Customer/earnPoints:
    post:
      summary: Earn loyalty points
      description: >-
        Allows a customer to earn loyalty points, updating their balance and
        creating a ledger entry.
      tags:
        - Customer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                CustomerId:
                  type: integer
                  description: The unique ID of the customer.
                  example: 123
                Points:
                  type: integer
                  description: The number of points to be earned.
                  example: 100
                CustomerPointLedgerSVoucherId:
                  type: integer
                  description: The Sales Voucher ID related to the points (optional).
                  example: 456
                CustomerPointLedgerBillNo:
                  type: string
                  description: The bill number related to the points (optional).
                  example: INV123
      responses:
        '200':
          description: Points successfully earned.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    example: 0
                  message:
                    type: string
                    example: Points earned successfully
                  data:
                    type: object
                    properties:
                      CustomerPointLedgerId:
                        type: integer
                        example: 789
                      CustomerPointLedgerPoints:
                        type: integer
                        example: 100
                      CustomerPointLedgerBalance:
                        type: integer
                        example: 500
        '400':
          description: Validation error or missing fields.
        '404':
          description: Customer not found.
        '500':
          description: Internal server error.
  /Customer/spendPoints:
    post:
      summary: Spend loyalty points
      description: >-
        Allows a customer to spend loyalty points, updating their balance and
        creating a ledger entry.
      tags:
        - Customer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
