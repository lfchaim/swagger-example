                      example: 10
                    sumAttributes:
                      type: array
                      items:
                        type: object
                        properties:
                          colType:
                            type: string
                            description: >-
                              Type of column aggregation (e.g.,
                              "sumWithLiteral").
                            example: sumWithLiteral
                          value:
                            type: string
                            description: The column or literal value to sum.
                            example: columnName
                          label:
                            type: string
                            description: Label for the aggregated result.
                            example: TotalColumn
                      description: Attributes to aggregate using SUM.
                Where:
                  type: object
                  description: Filtering criteria for the query.
                  example:
                    ItemType2Id:
                      $gte: '%value%'
                    ItemType2Code:
                      $like: '%value%'
                attributes:
                  type: array
                  items:
                    type: string
                  description: Specific attributes to fetch for each record.
                  example:
                    - ItemType2Id
                    - ItemType2Code
                    - ItemType2Name
                SortOrder:
                  type: array
                  items:
                    type: string
                  description: Sorting criteria for the records.
                  example:
                    - - ItemType2Id
