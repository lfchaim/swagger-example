definitions:
  FundSource:
    type: object
    properties:
      type:
        type: string
        description: |
          Type of fund:
            * `bank_account` - Bank Account
            * `credit_card` - Credit Card
            * `balance` - VersaPay Account
        enum:
          - bank_account
          - credit_card
          - balance
      token:
        type: string
        description: >-
          Fund's unique identifier used to identify fund when using other API
          calls.
      name:
        type: string
        description: Masked display name of the fund source.
      state:
        type: string
        enum:
          - verified
          - unverified
          - invalid
        description: Returned for bank accounts only.
  Transaction:
    x-extendedDiscriminator: transaction_type
    type: object
    required:
      - amount_in_cents
      - email
      - transaction_type
    properties:
      transaction_type:
        type: string
      amount_in_cents:
        type: integer
        description: Transaction amount in cents.
      email:
        type: string
        format: email
        description: Recipient email address.
      message:
        type: string
        description: A message describing the transaction.
      transaction_reference:
        type: string
        description: >-
          Extra useful data to help link transactions to other systems e.g. PO
          numbers, account numbers etc.
      unique_reference:
        type: string
        description: >-
          Similar to transaction_reference, except it must be unique. Can be
          used as a duplicate transaction check.
      process_on:
        type: string
        format: date
        description: The date `YYYY-MM-DD` when this transaction should be started.
      auto_withdraw:
        type: boolean
        description: >-
          Set `true` to have transaction auto settle from VersaPay balance to
          the specified bank account the night of completion; `false` to settle
          directly to VersaPay balance. Auto withdraw must be enabled for your
          account. Only applicable to request and pre_authorized_debit
          transactions.
    example:
      transaction_type: send
      amount_in_cents: 20000
      email: bob@example.com
      message: Thank you
      transaction_reference: Order 3487
      process_on: '2018-01-05'
      fund_token: BA9G329DNFPK
  SendTransaction:
    allOf:
      - $ref: '#/definitions/Transaction'
      - properties:
          transaction_type:
            type: string
            enum:
              - send
          debit_agreement_token:
            type: string
            description: >-
              The token that represents a pre-authorized agreement, see
              Agreements.
          fund_token:
            type: string
            description: Token of fund to use as the source.
          credit:
            type: boolean
            description: >-
              Set `true` to send money with VersaPay credit. Your account must
              be credit enabled.
          link_url:
            type: string
            description: >-
              A specified url associated with transaction for instance linking
              to an invoice.
  RequestTransaction:
    allOf:
      - $ref: '#/definitions/Transaction'
      - properties:
          transaction_type:
            type: string
            enum:
              - request
          debit_agreement_token:
            type: string
            description: >-
              The token that represents a pre-authorized agreement, see
              Agreements.
          fund_token:
            type: string
            description: Token of fund to use as the destination.
          link_url:
            type: string
            description: >-
              A specified url associated with transaction for instance linking
              to an invoice.
  DirectDebitTransaction:
    allOf:
      - $ref: '#/definitions/Transaction'
      - properties:
          transaction_type:
            type: string
            enum:
              - direct_debit
          fund_token:
            type: string
            description: Token of fund to use as the destination direct_debit.
          memo:
            type: string
            description: Memo displayed on customer banking statement.
          business_name:
            type: string
            description: Required if first_name and last_name are omitted.
          first_name:
            type: string
            description: First name of recipient.
          last_name:
            type: string
            description: Last name of recipient.
          to_fund_token:
            type: string
            description: >-
              May be provided instead of destination bank numbers on subsequent
              transactions when `transaction_type` is `direct_credit`.
          from_fund_token:
            type: string
            description: >-
              May be provided instead of source bank numbers on subsequent
              transactions when `transaction_type` is `direct_debit`.
          institution_number:
            type: string
            minLength: 3
            maxLength: 3
            description: >-
              Canadian Bank Account institution number. 3 digits. Required for
              new funding sources. Omitted if using
              `to_fund_token`/`from_fund_token` instead.
          branch_number:
            type: string
            minLength: 4
            maxLength: 5
            description: >-
              Canadian Bank Account branch number. Between 4-5 digits. Required
              for new funding sources. Omitted if using
              `to_fund_token`/`from_fund_token` instead.
          account_number:
            type: string
            minLength: 1
            maxLength: 12
            description: >-
              US or Canadian Bank Account number. Between 1-12 digits Required
              for new funding sources. Omitted if using
              `to_fund_token`/`from_fund_token` instead.
          routing_number:
            type: string
            description: >-
              US Bank Account routing number. Required for new funding sources.
              Omitted if using `to_fund_token`/`from_fund_token` instead.
          account_type:
            type: string
            description: >-
              US Bank Account type `checking` or `savings`. Required for new
              funding sources. Omitted if using
              `to_fund_token`/`from_fund_token` instead.
            enum:
              - checking
              - savings
  DirectCreditTransaction:
    allOf:
      - $ref: '#/definitions/Transaction'
      - properties:
          transaction_type:
            type: string
            enum:
              - direct_credit
          fund_token:
            type: string
            description: Token of fund to use as the source direct_credit.
          memo:
            type: string
            description: Memo displayed on customer banking statement.
          business_name:
            type: string
            description: Required if first_name and last_name are omitted.
          first_name:
            type: string
            description: First name of recipient.
          last_name:
            type: string
            description: Last name of recipient.
          to_fund_token:
            type: string
            description: >-
              May be provided instead of destination bank numbers on subsequent
              transactions when `transaction_type` is `direct_credit`.
          from_fund_token:
            type: string
            description: >-
              May be provided instead of source bank numbers on subsequent
              transactions when `transaction_type` is `direct_debit`.
          routing_number:
            type: string
            description: >-
              US Bank Account routing number. Required for new funding sources.
              Omitted if using `to_fund_token`/`from_fund_token` instead.
          account_type:
            type: string
            description: >-
              US Bank Account type `checking` or `savings`. Required for new
              funding sources. Omitted if using
              `to_fund_token`/`from_fund_token` instead.
            enum:
              - checking
              - savings
          institution_number:
            type: string
            minLength: 3
            maxLength: 3
            description: >-
              Canadian Bank Account institution number. 3 digits. Required for
              new funding sources. Omitted if using
              `to_fund_token`/`from_fund_token` instead.
          branch_number:
            type: string
            minLength: 4
            maxLength: 5
            description: >-
              Canadian Bank Account branch number. Between 4-5 digits. Required
              for new funding sources. Omitted if using
              `to_fund_token`/`from_fund_token` instead.
          account_number:
            type: string
            minLength: 1
            maxLength: 12
            description: >-
              US or Canadian Bank Account number. Between 1-12 digits Required
              for new funding sources. Omitted if using
              `to_fund_token`/`from_fund_token` instead.
  TransactionResponse:
    type: object
    properties:
      token:
        type: string
        description: The transaction identifier.
      amount_in_cents:
        type: integer
        description: Transaction amount in cents.
      email:
        type: string
        description: Recipient email address.
      message:
        type: string
        description: A message describing the transaction.
      state:
        type: string
        enum:
          - new
          - wait_for_claim
          - wait_for_request_approval
          - wait_for_bank_account_verification
          - rejected
          - in_progress
          - error
          - nsfed
          - cancelled
          - completed
          - completed_but_nsfed
        description: 'Transactions current state, see Transaction Lifecycle.'
      from_account:
        type: string
        description: Name of the originating account.
      to_account:
        type: string
        description: Name of the recipient account.
      from_fund:
        type: string
        description: >
          Name of the balance or bank account used when **transaction_type** is
          'send' or 'direct_credit'.
      to_fund:
        type: string
        description: >
          Name of the destination balance or bank account when
          **transaction_type** is 'request' or 'direct_debit'.
      transaction_reference:
        type: string
        description: Reference value associated with the transaction.
      unique_reference:
        type: string
        description: >-
          Similar to transaction_reference, except it must be unique. Can be
          used as a duplicate transaction check.
      link_url:
        type: string
        description: A specified url associated with transaction.
      process_on:
        type: string
        description: The YYYY-MM-DD date when this transaction will be started.
      created_by_user:
        type: string
        format: uuid
      auto_withdraw:
        type: boolean
        description: >
          If `true` then the transaction will be auto withdrawn the night of
          completion.
      auto_withdrawal_token:
        type: string
    example:
      token: 79VMZNLXCBL9
      amount_in_cents: 15000
      message: Thank you for doing business
      link_url: 'http://a.link.to/your/invoice'
      type: transaction
      transaction_type: send_money
      email: bob.smith@example.com
      state: in_progress
      transaction_reference: Lease 123
      unique_reference: null
      from_account: John Doe
      to_account: Jane Smith
      process_on: null
      from_fund: TD Canada Trust
      created_by_user: Uf6TaxzBMBBT_rXjsrN7
  Agreement:
    type: object
    properties:
      token:
        type: string
        description: The agreement identifier.
      state:
        type: string
        description: 'Transaction''s current state, see Transaction Lifecycle.'
      email:
        type: string
        description: Recipient email address.
      name:
        type: string
        description: Recipient name.
      created_by_user:
        type: string
        description: >-
          Name of the user otherwise the API token appears if the transaction
          was created with the api.
      created_by_account:
        type: string
        description: >-
          Account name of the user otherwise the API token appears if the
          transaction was created with the api.
      reference:
        type: string
        description: An optional reference.
      message:
        type: string
        description: A message describing the agreement.
      rejection_reason:
        type: string
        description: |
          Message for the creator of an agreement. Set when state is `rejected`.
      type:
        type: string
        description: |
          Type of agreement - `debit_agreement`.
    example:
      token: 3TJWJB36M973
      state: pending
      name: John Doe
      email: user@example.com
      reference: Ad 123
      message: Thank you for your business
      type: debit_agreement
      created_by_user: Uf6TaxzBMBBT_rXjsrN7
      created_by_account: Central Media News
  Customer:
    type: object
    required:
      - identifier
      - name
    properties:
      identifier:
        type: string
        description: 'Customer number, must be unique within supplier. Alphanumeric.'
        example: C1234
      name:
        type: string
        description: Customer name.
        example: Acme Inc.
      email:
        type: string
        format: email
        description: Email address of the primary contact.
        example: bob.smith@example.com
      first_name:
        type: string
        description: First name of the primary contact.
        example: Bob
      last_name:
        type: string
        description: Last name of the primary contact.
        example: Smith
      notes:
        type: string
        description: Optional text field up to 64K.
        example: Payment terms will be revised next year.
      address_1:
        type: string
        description: Billing address line 1.
        example: 200 Main Street
      address_2:
        type: string
        description: Billing address line 2.
        example: Suite 250
      city:
        type: string
        description: Billing address - city.
        example: Toronto
      province:
        type: string
        description: Billing address - state or province.
        example: 'ON'
      postal_code:
        type: string
        description: Billing address - zip or postal code.
        example: M5M 5M5
      country:
        type: string
        description: Billing address - country.
        example: CA
      telephone:
        type: string
        description: Customer phone number.
        example: (416) 123-4567
      fax:
        type: string
        description: Customer fax number.
        example: (416) 100-1020
      url:
        type: string
        format: uri
        description: Customer web site.
        example: www.acmeinc.com
      business_number:
        type: string
        description: Customer EIN or Business Number. 20-character alphanumeric.
        example: GS324587987
      locale:
        type: string
        description: 'Customer language, based on ISO 639-1 standard.'
        enum:
          - en
          - fr
      parent_identifier:
        type: string
        description: >-
          Required if the customer is part of a hierarchy, and this customer has
          a level (parent) above it. This is the identifier of the customer
          immediately above this customer in the tree.
        example: P3212
      pdf_attachment_opt_in:
        type: boolean
        description: >-
          If `true`, the customer will receive PDFs of invoices and attachments
          with all invoice notifications.
        default: false
      account_status:
        type: string
        description: The status of the customer's account with the supplier.
        enum:
          - open
          - closed
          - on_hold
        default: open
      last_contact_date:
        type: string
        format: date
        description: >-
          The last time the customer was contacted. It is ignored if the
          customer already has a last contact date and it is more recent than
          this one.
        example: '2017-12-04'
      next_contact_date:
        type: string
        format: date
        description: >-
          The date of the next planned contact with the customer. This always
          overwrites what is on the customer.
        example: '2018-02-15'
      credit_limit_cents:
        type: integer
        description: >-
          The customer's credit limit. This is the maximum value of outstanding
          invoices before the supplier is alerted, if supplier is configured to
          monitor this. If the customer is a multi-currency customer, this is
          the total credit limit converted to a single currency (see next
          field.)
        example: '2000000'
      credit_limit_currency:
        type: string
        description: >-
          Currency of the credit limit. If blank, defaults to the currency of
          the majority of the customer's invoices. If there are no invoices,
          defaults to the supplier’s default currency.
        example: CAD
      credit_rating:
        type: string
        description: Credit rating for the customer.
        example: AA
      terms_type:
        type: string
        description: This field and `terms_value` specify how to set a customer's due date.
        enum:
          - date
          - day
      terms_value:
        type: integer
        description: >
          This field and `terms_type` specify how to set a customer's invoice
          due date.


          If terms_type is 'day':


          * It means the due date should be <terms_value> days after invoice
          date.

          * E.g. if terms_value is 30, the due date must be 30 days after the
          invoice date.

          * It must be a whole number between 0 and 100.


          If terms_type is 'date':


          * It means the due date is on a fixed day (terms_value) of the month.

          * E.g. if terms_value is 15, it means the due date should be on the
          15th of the month after invoice date.

          * It must be an integer between 1 and 27 inclusive, or -1 to specify
          the last day of the month, or -2 to specify the second-last day of the
          month.
        example: 15
      company_bio:
        type: string
        description: Short description of products and services that the customer offers.
        example: Acme Inc. sells cutting-edge widgets.
      ignores_cc_payment_rules:
        type: boolean
        description: >-
          If this is `true`, it means that the customer is not subject to any
          credit card payment rules, and is free to use credit cards any time.
        default: false
        example: 'false'
      tags:
        type: string
        description: One or more tags separated by semi-colons.
        example: Blue;Green;Yellow
      external_id:
        type: string
        description: External (ERP-based) identifier for the customer record.
      line_item_attributes:
        type: array
        items:
          $ref: '#/definitions/Contact'
        example:
          - email: jane.smith@example.com
            first_name: Jane
            last_name: Smith
            telephone: 809-888-1234
            title: Buyer
          - email: bob.smith@example.com
            first_name: Bob
            last_name: Smith
            title: Manager
            department: Accounts Payable
            telephone: 809-345-9833
          - email: steve.jobs@example.com
            first_name: Steve
            last_name: Jobs
            title: CEO
  Contact:
    type: object
    required:
      - email
    properties:
      email:
        type: string
        description: Email address of the contact.
        format: email
      first_name:
        type: string
        description: First name of the contact.
      last_name:
        type: string
        description: Last name of the contact.
      title:
        type: string
        description: Title of the contact.
      department:
        type: string
        description: Department of the contact.
      telephone:
        type: string
        description: Phone number of the contact.
  Invoice:
    type: object
    required:
      - number
      - customer_identifier
    properties:
      number:
        type: string
        description: 'Invoice number, must be unique within supplier.'
      display_number:
        type: string
        description: >
          Invoice number as displayed to customers. Optional if this is the same
          as `number`.
      currency:
        type: string
        description: 'Currency code, based on ISO-4217. E.g. `CAD`, `USD`, `AUD`'
      amount:
        type: integer
        description: The invoice amount in cents.
      subtotal_tax1:
        type: integer
        description: Tax amount in cents.
      subtotal_tax2:
        type: integer
        description: >-
          Additional field to carry tax amount (in cents). For example, when
          invoice shows state (provincial) and federal taxes.
      customer_identifier:
        type: string
        description: Unique identifier for customer.
      date:
        type: string
        format: date
        description: 'Invoice date, YYYY-MM-DD, based on ISO-8601.'
      order_date:
        type: string
        format: date
        description: 'Order date, YYYY-MM-DD.'
      due_date:
        type: string
        format: date
        description: 'Invoice due date, YYYY-MM-DD.'
      purchase_order_number:
        type: string
        description: Purchase order number.
      notes:
        type: string
        description: Optional text field up to 64K.
      shipping_name:
        type: string
        description: 'Shipping address: recipient name'
      shipping_address_1:
        type: string
        description: 'Shipping address: line 1'
      shipping_address_2:
        type: string
        description: 'Shipping address: line 2'
      shipping_city:
        type: string
        description: 'Shipping address: city'
      shipping_province:
        type: string
        description: >-
          Shipping address: state or province. Based on the second part (after
          hyphen) of codes in ISO 3166-2 standard. E.g. "ON" for Ontario, "CA"
          for California
      shipping_postal_code:
        type: string
        description: 'Shipping address: zip or postal code'
      line_item_attributes:
        type: array
        description: >-
          Details of each line-item for the invoice. Any additional non-standard
          attribute will be stored with the line-item record and available for
          presentment rendering.
        items:
          $ref: '#/definitions/LineItem'
      auto_debit:
        type: string
        description: >
          `Y` (invoice is to be auto-paid if customer has pre-authorized
          payment) or `N` (invoice is to be paid manually by customer)
        enum:
          - 'Y'
          - 'N'
      division:
        type: string
        description: Division Code. Required only if supplier supports divisions.
      auto_pay_reference:
        type: string
        description: >-
          For AutoPay agreements that reference a policy# or contract#, etc.,
          specify that number.
      owing_cents:
        type: integer
        description: >
          Balance remaining on this invoice or credit memo.


          Required if supplier is configured for Balance Sync, otherwise
          ignored.
      ref1:
        type: string
        description: >-
          A reference that is meaningful to the customer, e.g. Policy number,
          contract number, etc.
      ref2:
        type: string
        description: As above.
      ref3:
        type: string
        description: As above.
      adjustments_attributes:
        type: array
        description: Adjustments such as Fuel Surcharge or Discount.
        items:
          type: object
          properties:
            label:
              type: string
              description: Label for adjustment amount.
            amount:
              type: integer
              description: Adjustment amount in cents.
      plan_identifier:
        type: string
        description: >
          Payment plan template identifier. If populated, this puts the invoice
          on a payment plan.


          Required if supplier is configured for payment plans.
      plan_start_date:
        type: string
        format: date
        description: >-
          Payment plan start date. Required if supplier is configured for
          payment plans.
      plan_end_date:
        type: string
        format: date
        description: >-
          Payment plan end date. Required if supplier is configured for payment
          plans.
      plan_payment_amount:
        type: integer
        description: >-
          Payment plan recurring payment amount. Required if supplier is
          configured for payment plans.
      annualized_amount:
        type: integer
        description: >
          The annual invoice amount. When this is populated, the importer will
          calculate a pro-rated invoice amount based on the next two dates.


          Required if the supplier is configured for payment plans.
      annualized_effective_date:
        type: string
        format: date
        description: >-
          The date that the annualized_amount takes effect. Mandatory if
          annualized_amount is populated.
      annualized_expiry_date:
        type: string
        format: date
        description: >
          The end date of the period for which the annualized_amount is in
          effect.


          Mandatory if annualized_amount is populated. The difference between
          this date and the effective date (inclusive) is used to pro-rate the
          invoice amount or any adjustments to the amount.
      external_id:
        type: string
        description: >-
          Optional external identifier for the invoice to be included in payment
          exports.
    example:
      number: sh763-h3454-dh3432
      display_number: INV1234
      customer_identifier: CUS001
      purchase_order_number: PO-3847
      amount: 40000
      currency: usd
      date: '2017-11-01'
      due_date: '2017-12-15'
      notes_text: Thank you for your business
      shipping_name: Acme Inc.
      shipping_address_1: 1 Main Street
      shipping_address_2: Suite 600
      shipping_postal_code: '90210'
      shipping_city: New York
      shipping_province: NY
      owing_cents: 30000
      line_item_attributes:
        - number: '1'
          item_number: A3947C9878
          description: Modems
          quantity: 40
          unit_cost_cents: 1000
          amount: 40000
  LineItem:
    type: object
    properties:
      number:
        type: string
        description: Invoice line-item number
      description:
        type: string
        description: Invoice line-item description
      quantity:
        type: number
        description: Invoice line-item quantity
      unit_cost_cents:
        type: integer
        description: Invoice line-item unit price in cents.
      amount:
        type: integer
        description: Invoice line-item total in cents.
      balance_cents:
        type: integer
        description: >-
          Line-item balance in cents. Applicable if accepting short payments at
          line-item level.
  PaymentImport:
    type: object
    required:
      - identifier
    properties:
      identifier:
        type: string
        description: >
          Payment identifier; must be unique within supplier. May appear
          multiple times in a single file if payment was applied to multiple
          invoices.
      amount:
        type: integer
        description: 'The amount of total payment, in cents.'
      date:
        type: string
        format: date
        description: 'Payment date, in the format YYYY-MM-DD.'
      currency:
        type: string
        description: 'Currency code, based on ISO-4217.'
      invoice_number:
        type: string
        description: >
          Invoice number associated with this payment (if payment covers single
          invoice).

          If payment covers multiple invoices, provide
          `payment_amount_attributes` instead.
      payment_code:
        type: string
        description: Payment code
      payment_description:
        type: string
        description: Description corresponding to payment code.
      payment_amount_attributes:
        type: array
        description: Applicable only when payment covers multiple invoices.
        items:
          type: object
          properties:
            invoice_number:
              type: string
              description: Invoice number associated with this payment.
            amount:
              type: integer
              description: Amount paid towards this invoice.
            notes:
              type: string
              description: Payment note
            purchase_order_number:
              type: string
              description: Purchase order number to link this payment to an invoice.
            ref1:
              type: string
              description: >-
                An additional reference number that could link this payment to
                an invoice. E.g. policy number, contract number, etc.
            ref2:
              type: string
              description: Same as above.
            ref3:
              type: string
              description: Same as above.
      division:
        type: string
        description: 'Division code, if divisions are set up.'
      customer_identifier:
        type: string
        description: Customer identifier.
      customer_name:
        type: string
        description: Customer name.
    example:
      identifier: PMT001-05
      amount: 10000
      currency: usd
      date: '2017-12-02'
      customer_identifier: CUS001
      payment_amounts_attributes:
        - invoice_number: INV004
          amount: 8000
        - invoice_number: INV010
          amount: 2000
  FileImport:
    type: object
    properties:
      id:
        type: string
        description: The import batch identifier.
        example: 21877
      file_name:
        type: string
        description: The original filename of the raw file.
        example: invoices.csv
      file_size:
        type: integer
        description: The original size of the raw file in bytes.
        example: 1024
      file_content_type:
        type: string
        description: The MIME/content-type of the raw file.
        example: text/plain
      file_fingerprint:
        type: string
        description: The fingerprint/hash representing the raw file contents.
        example: bf817b5548d69f6a3a49b6bb872fb906
      error:
        type: string
        description: The error message corresponding to a failed import.
        example: ''
      result_message:
        type: string
        description: Result of batch import.
        example: 5487 invoices
      complete_at:
        type: string
        description: The ISO8601 timestamp corresponding to completion of the import.
        example: '2016-08-30T15:39:30-04:00'
  PaymentExport:
    type: object
    properties:
      payment_reference:
        type: string
        description: The payment identifier
      invoice_number:
        type: string
        description: The display number of the invoice for which the payment was made.
      date:
        type: string
        format: date
        description: 'The payment date, in YYYY-MM-DD format.'
      amount:
        type: string
        description: >-
          The amount of the payment applied to the invoice, in dollars and
          cents.
      plan_fee:
        type: string
        description: >-
          Payment plan fee amount, in dollars and cents, associated to this
          invoice.
      payment_amount:
        type: string
        description: The amount of the total payment.
      payment_transaction_amount:
        type: string
        description: The amount of the total payment.
      payment_method:
        type: string
        description: The method used to make payment.
      payment_from_bank_account:
        type: string
        description: |
          `true` if the payment was made using a bank account.
      payment_from_credit_card:
        type: string
        description: |
          `true` if the payment was made using a credit card.
      payment_institution_name:
        type: string
        description: 'Institution name, if the payment was made using a bank account.'
      payment_credit_card_brand:
        type: string
        description: >
          Credit card "association brand", if the payment was made using a
          credit card. Example: VISA, MASTER
      short_pay_indicator:
        type: string
        description: |
          `Y` if a short payment was made.
      payment_note:
        type: string
        description: Note accompanying the payment.
      auto_debit_indicator:
        type: string
        description: |
          `Y` if the payment was made via AutoPay agreement.
      invoice_balance:
        type: string
        description: Remaining balance on the invoice (after the payment is processed).
      payment_timestamp:
        type: string
        description: The ISO8601 timestamp corresponding to payment.
      invoice_division:
        type: string
        description: The division code if any associated with the invoice.
      invoice_division_number:
        type: string
        description: The external division identifier if any associated with the invoice.
      invoice_division_name:
        type: string
        description: The division name if any associated with the invoice.
      pay_to_bank_account:
        type: string
        description: The GL number of the settlement account receiving the payment.
      pay_to_bank_account_name:
        type: string
        description: The display name of the settlement account receiving the payment.
      customer_identifier:
        type: string
        description: The invoice customer identifier.
      customer_name:
        type: string
        description: The invoice customer name.
      status:
        type: string
        description: The payment status.
      payment_source:
        type: string
        description: The source of the payment.
      payment_code:
        type: string
        description: >-
          The back office payment code (applicable to externally sourced
          payments).
      payment_description:
        type: string
        description: >-
          The back office payment description (applicable to externally sourced
          payments).
      gateway_authorization_code:
        type: string
        description: The underlying gateway authorization code.
      purchase_order_number:
        type: string
        description: The purchase order number entered at the time of making a prepayment.
      ref1:
        type: string
        description: >-
          The reference number or string entered at the time of making a
          prepayment.
      ref2:
        type: string
        description: Same as above.
      ref3:
        type: string
        description: Same as above.
      short_pay_reason_identifier:
        type: string
        description: 'Short pay reason code, if set up.'
      short_pay_reason:
        type: string
        description: 'Short pay reason description, if set up.'
      invoice_amount_paid:
        type: string
        description: >-
          The total amount of payments, in dollars and cents, made to date via
          ARC towards this invoice.
      invoice_identifier:
        type: string
        description: The identifier of the invoice for which the payment was made.
      invoice_date:
        type: string
        format: date
        description: 'Invoice date, in the format YYYY-MM-DD.'
      invoice_external_id:
        type: string
        description: >-
          The external identifier/reference, if any, of the invoice for which
          the payment was made.
      invoice_currency:
        type: string
        description: The currency of the invoice for which the payment was made.
      invoice_purchase_order_number:
        type: string
        description: The purchase order number associated to the invoice.
      invoice_ref1:
        type: string
        description: Reference number or string associated to the invoice.
      invoice_ref2:
        type: string
        description: Same as above.
      invoice_ref3:
        type: string
        description: Same as above.
      cumulative_customer_amount:
        type: string
        description: >
          The total payment processed for *this* customer under *this*
          `payment_reference`.
      line_item_transactional_amounts:
        type: array
        items:
          type: object
          properties:
            line_item_number:
              type: string
              description: Invoice line-item number
            line_item_payment_amount:
              type: string
              description: >-
                The amount of the payment applied to the line-item, in dollars
                and cents.
            line_item_balance:
              type: string
              description: >-
                Remaining balance on the line-item (after the payment is
                processed), in dollars and cents.
            line_item_short_pay_indicator:
              type: string
              description: |
                `Y` if a short payment was made.
            line_item_payment_note:
              type: string
              description: Note accompanying the payment at the line-item level.
            line_item_short_pay_reason_identifier:
              type: string
              description: 'Short pay reason code, if set up.'
            line_item_short_pay_reason:
              type: string
              description: 'Short pay reason description, if set up.'
        description: >
          Payments applied to invoice line-items. Applicable if accepting short
          payments at line-item level.
  Dispute:
    type: object
    properties:
      closed_at:
        type: string
        format: date-time
        description: Date and time when dispute was closed.
      opened_at:
        type: string
        format: date-time
        description: Date and time when dispute was opened.
      opener:
        type: string
        description: Name or email address of the user who opened the dispute.
      closer:
        type: string
        description: Name or email address of the user who closed the dispute.
      opening_comment_text:
        type: string
        description: Comment text when the dispute was opened.
      closing_comment_text:
        type: string
        description: Comment text when the dispute was closed.
      invoice_number:
        type: string
        description: Invoice number against which dispute was opened.
      invoice_amount_paid:
        type: string
        description: >-
          The total amount of payments, in dollars and cents, made to date via
          ARC towards this invoice.
      invoice_balance:
        type: object
        description: 'Invoice balance, in cents.'
        additionalProperties:
          type: integer
      dispute_reason_identifier:
        type: string
        description: 'Dispute reason code, if set up.'
      dispute_reason_label_en:
        type: string
        description: >-
          Dispute reason label in English. Applicable when dispute reason codes
          are set up in the account.
      dispute_reason_label_fr:
        type: string
        description: >-
          Dispute reason label in French. Applicable when dispute reason codes
          are set up in the account.
      opening_comment_users_notified:
        type: array
        items:
          type: string
        description: Names or email addresses of users notified when opening dispute.
      closing_comment_user_notified:
        type: array
        items:
          type: string
        description: >
          Name or email addresses of users notified when closing dispute.


          _Note: When the dispute is still open, `closing_comment_user_notified`
          is an empty string (`""`), not an array._
      creator_business_name:
        type: string
        description: Business name of the organization that `opener` represents.
      closer_business_name:
        type: string
        description: Business name of the organization that `closer` represents.
      invoice_identifier:
        type: string
        description: Internal unique identifier for the invoice record.
      invoice_external_id:
        type: string
        description: External identifier for the invoice record.
securityDefinitions:
  basicAuth:
    type: basic
responses:
  PreconditionFailed:
    description: Precondition Failed
    schema:
      type: object
      additionalProperties:
        type: string
        description: Error message
      example:
        email: |
          can't be blank
  UnauthorizedError:
    description: Unauthorized
    schema:
      type: object
      properties:
        error:
          type: string
          description: Error message
          example: You need to sign in or create an account before continuing.
