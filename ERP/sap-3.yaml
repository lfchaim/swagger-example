tags:
  - name: Fund Sources
    description: >
      Fund Sources include bank accounts, credit cards, and balance associated
      with your account. The tokenized representation of these fund sources can
      be used to specify which fund to use when working with Transactions and
      Debit Agreements.
  - name: Transactions
    description: >
      Transactions are used to move funds between fund sources. The
      directionality of the money transfer depends on the transaction type and
      the specified from/to fund tokens.


      ## Lifecycle


      The lifecycle states of transaction settlement/flow are:


      |State|Context|Action to Take|

      |:--|:--|:--|

      |`new`|The initial state for a new transaction.|N/A|

      |`wait_for_claim`|The transaction has been created and an email delivered
      to the other party. They have not yet signed up and approved the
      transaction.|None. You may want to remind the other party if the payment
      has not been approved for a sufficient length of time.|

      |`wait_for_request_approval`|The requestee has an account already. They
      have not yet approved the transaction.|None. You may want to remind the
      other party if the payment has not been approved for a sufficient length
      of time.|

      |`wait_for_bank_account_verification`|The requestee has signed up and
      accepted the transaction, however they have not yet verified their bank
      account.<br><br>Note: Users are required to verify their bank account by
      going through the micro-debit process in which VersaPay debits and credits
      the user’s bank account an undisclosed amount. The user then checks their
      online banking and fills in the amount on the VersaPay website.|None. You
      may want to remind the other party if the bank has not been verified in a
      sufficient length of time.|

      |`rejected`|The transaction was rejected by the requestee.|Review the
      rejection message.|

      |`in_progress`|The transaction has been sent to the bank and is in
      progress.|N/A|

      |`error`|There was an error while processing the transaction.|Contact your
      bank if the error pertains to your bank account.<br><br>Contact client or
      create a new transaction if the error is with the other party’s bank
      account.|

      |`nsfed`|The transaction's selected fund has in-sufficient funds and the
      transaction has been cancelled.|Contact your bank if the error pertains to
      your bank account.<br><br>Contact client or create a new transaction if
      the error is with the other party’s bank account.|

      |`cancelled`|The transaction has been cancelled by an administrator. A
      transaction can only be cancelled before the debit has been sent to the
      bank.|N/A|

      |`completed`|The transaction has been completed successfully.|Update your
      order to "Paid".|

      |`completed_but_nsfed`|The transaction was completed successfully, but has
      been returned by the bank as in-sufficient funds.|Update your order to
      "Un-paid".|


      ## Webhooks


      When using Webhooks, your application will be notified any time a
      transaction's status has been updated. Note that for a variety of reasons
      strict ordering of notifications cannot be guaranteed. We recommend any
      integrations that track a "last seen" state either be aware of the flow of
      states (downward on the preceeding list), or only track actionable states.
  - name: Agreements
    description: >
      Debit Agreements are a digital analog to paper pre-authorized debit
      agreements that businesses could use, for instance, for monthly billing.


      The creator of an agreement can cancel at any time. The other party can
      approve, reject, or later revoke an agreement at any time.


      ## Lifecycle


      The lifecycle states of debit agreements are:


      |State|Context|Action to take|

      |:--|:--|:--|

      |`pending`|The recipient has been sent an email to approve the
      agreement.|N/A|

      |`approved`|The agreement has been approved.|Create a pre-authorized debit
      transaction that references the agreement when you bill.|

      |`rejected`|The agreement was rejected by the requestee.|Review the
      rejection message.|

      |`cancelled`|The agreement was cancelled by the requestor.|Cancel the
      subscription with the other party.|

      |`revoked`|The agreement was cancelled by the requestee.|Cancel the
      subscription with the other party.|

      |`wait_for_bank_account_verification`|The associated bank account has not
      yet been verified.|None - The recipient has been notified.<br><br>Email
      the recipient if the bank account is not verified within a reasonable
      amount of time.|

      |`invalid_funding_source`|There were errors with the associated bank
      account or credit card.|None - The recipient has been notified to change
      the funding source.<br><br>Email the recipient if the fund is not changed
      within a reasonable amount of time.|


      ## Webhooks


      When using Webhooks, your application will be notified any time an
      agreement’s status has been updated (see Lifecycle); allowing you to start
      billing when approved or cancel a subscription when rejected or revoked.
  - name: Hosted Checkout
    description: >
      Hosted checkout is a URL based method for accepting a payment through your
      website or email without the need for custom programming.
  - name: Customers
  - name: Invoices
  - name: Payments
  - name: File Imports
  - name: Webhooks
    description: >
      VersaPay uses the [Webhook](http://www.webhooks.org/) pattern to POST
      updates to a HTTP (port 80) or HTTPS (port 443) URL you specify. The
      specified URL must return a status code of 200 otherwise VersaPay will
      continue attempting to deliver the POST up to a system defined number of
      attempts.


      You can view details for the latest notifications sent to your application
      by visiting `/developers/webhook_responses` in
      [demo](https://demo.versapay.com//developers/webhook_responses) or
      [production](https://secure.versapay.com//developers/webhook_responses).


      Webhooks can receive updates for the following:


      * State updates of any **Transaction** created by your account or going to
      your account. The request parameters will contain the same attributes as
      returned by viewing a transaction via `GET /api/transactions/{token}`.


      * State updates of any **Debit Agreement** created by your account or sent
      to your account. The request parameters will contain the same attributes
      as returned by viewing a debit agreement via `GET
      /api/debit_agreements/{token}`.


      VersaPay will append a [HMAC-SHA256](https://en.wikipedia.org/wiki/HMAC)
      signature attribute to all webhook notifications. For instance:


      ```

      POST http://your.domain.com/your/webhook/url

      {
          "to_account":"Example user",
          "token":"5TH3ACC3AU21",
          "transaction_reference":"",
          "from_account":"First1 Last1",
          "from_fund":"THE TORONTO-DOMINION BANK",
          "transaction_type":"send_money",
          "amount_in_cents":500,
          "type":"transaction",
          "created_by_user":"699cMPe6BAyqvVsZA5mo",
          "message":"",
          "state":"completed",
          "link_url":"",
          "email":"user@example.com",
          "signature":"USYpBfZFQQHa2%2BT6UtDPUVFfUPP0aobWpXe5DE9hPOY%3D%0A"
      }

      ```


      To verify the authenticity of received webhook notifications:


      1. Generate a single line request string concatenated with new line from:
        
        - The upper cased HTTP verb/method<br>
        - The webhook URL<br>
        - The attribute key/value pairs (without spaces) sorted ascending by key (**excluding the signature attribute**)<br>
      2. Calculate the HMAC-SHA256 of the single line string along using your
      VersaPay signing key (which is displayed on your webhook account settings)
      and [Base64](https://en.wikipedia.org/wiki/Base64) the result.

      3. [URL Encode](https://www.w3schools.com/tags/ref_urlencode.asp) the HMAC
      and compare to the value of the `signature` attribute for a match.


      ```ruby

      # Example of HMAC-SHA256 signature calculation - using Rails/Sinatra our
      POST payload is accessible via params


      require 'openssl'

      require 'base64'

      require 'erb'


      webhook_url = 'http://your.domain.com/your/webhook/url';

      webhook_signing_key = 'v7aJHjbbxASKiwDW5wq6';


      original_signature = params.delete(:signature)

      sorted_key_values = params.keys.sort.map{ |key| "#{key}#{params[key]}"
      }.join


      request_string = "POST\n#{webhook_url}\n#{sorted_key_values}"


      expected_signature = ERB::Util.url_encode( Base64.encode64(
      OpenSSL::HMAC.digest(

      OpenSSL::Digest::SHA256.new, webhook_signing_key, request_string

      ) ) )


      puts "\nexpected signature: #{expected_signature}"

      puts "\noriginal signature: #{original_signature}"

      puts "\nauthentic? #{expected_signature == original_signature}"

      ```
    x-traitTag: true
x-tagGroups:
  - name: PayPort
    description: Operations available for PayPort integration.
    tags:
      - Fund Sources
