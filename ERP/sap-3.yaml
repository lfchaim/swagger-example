paths:
  /api/funds:
    get:
      summary: View Your Fund Sources
      operationId: getFundSources
      tags:
        - Fund Sources
      responses:
        '200':
          description: Successful Operation
          schema:
            type: array
            items:
              $ref: '#/definitions/FundSource'
            example:
              - type: bank_account
                token: BA7YQ5881W8Q
                name: TD Canada Trust (2929)
                state: verified
              - type: credit_card
                token: CC7HPKMIUP2D
                name: VISA **2224
              - type: balance
                token: VPB2VJ7W9UVW
                name: VersaPay Account
        '401':
          $ref: '#/responses/UnauthorizedError'
  /api/transactions:
    post:
      summary: Create Transactions
      description: ''
      operationId: createTransaction
      tags:
        - Transactions
      parameters:
        - in: body
          name: body
          description: Transaction to create.
          required: true
          schema:
            $ref: '#/definitions/Transaction'
      responses:
        '201':
          description: Created
          schema:
            $ref: '#/definitions/TransactionResponse'
        '401':
          $ref: '#/responses/UnauthorizedError'
        '412':
          $ref: '#/responses/PreconditionFailed'
    get:
      summary: View Transactions
      operationId: viewAllTransactions
      tags:
        - Transactions
      parameters:
        - name: page
          type: integer
          in: query
          description: 50 items are displayed per page.
      responses:
        '200':
          description: Successful Operation
          schema:
            type: array
            items:
              $ref: '#/definitions/TransactionResponse'
        '401':
          $ref: '#/responses/UnauthorizedError'
  '/api/transactions/{token}':
    get:
      summary: View a Transaction
      operationId: viewTransaction
      tags:
        - Transactions
      parameters:
        - name: token
          in: path
          type: string
          required: true
          description: The transaction identifier.
      responses:
        '200':
          description: Successful Operation
          schema:
            $ref: '#/definitions/TransactionResponse'
        '401':
          $ref: '#/responses/UnauthorizedError'
  '/api/transactions/{token}/approve':
    post:
      summary: Approve a Transaction
      description: >
        Approve a `new` or `wait_for_request_approval` transaction.<br>

        An API key with administrative access is required to approve a
        transaction.
      operationId: approveTransaction
      tags:
        - Transactions
      parameters:
        - name: token
          in: path
          type: string
          required: true
          description: The transaction identifier.
        - name: fund_token
          in: body
          schema:
            type: object
            properties:
              fund_token:
                type: string
                description: >
                  Your bank account or balance's **token** attribute. Omitting
                  this option will approve the transaction using your default
                  bank account.
                example: 5TH3ACC3AU21
      responses:
        '200':
          description: Successful Operation
          schema:
            $ref: '#/definitions/TransactionResponse'
        '401':
          $ref: '#/responses/UnauthorizedError'
        '412':
          description: Precondition Failed
          schema:
            type: object
            properties:
              error:
                type: string
                description: Error message.
            example:
              error: >-
                API token does not have permission for this request. Please
                contact your account administrator.
  '/api/transactions/{token}/cancel':
    post:
      summary: Cancel a Transaction
      description: >
        Cancel a `new`, `wait_for_request_approval` or
        `wait_for_bank_account_verification` transaction you created.
        Transactions cannot be cancelled after they have been sent to the bank
        and are `in_progress`.<br>

        An API key with administrative access is required to approve a
        transaction.
      operationId: cancelTransaction
      tags:
        - Transactions
      parameters:
        - name: token
          in: path
          type: string
          required: true
          description: The transaction identifier.
      responses:
        '200':
          description: Successful Operation
          schema:
            $ref: '#/definitions/TransactionResponse'
        '412':
          description: Precondition Failed
          schema:
            type: object
            properties:
              error:
                type: string
                description: Error message.
            example:
              error: >-
                API token does not have permission for this request. Please
                contact your account administrator.
  /api/debit_agreements:
    post:
      summary: Create an Agreement
      description: ''
      operationId: createAgreement
      tags:
        - Agreements
      parameters:
        - in: body
          name: body
          required: true
          schema:
            type: object
            required:
              - email
            properties:
              email:
                type: string
                description: Recipient email address.
                example: bob.smith@example.com
              reference:
                type: string
                description: >-
                  Extra useful data to help link transactions to other systems
                  e.g. PO numbers, account numbers etc.
                example: '87769089'
              message:
                type: string
                description: A message describing what the agreement is for.
                example: Debit agreement for order number - 87769089
      responses:
        '201':
          description: Created
          schema:
            $ref: '#/definitions/Agreement'
        '401':
          $ref: '#/responses/UnauthorizedError'
        '412':
          $ref: '#/responses/PreconditionFailed'
  /api/debit_agreements/sent:
    get:
      summary: View Sent Agreements
      operationId: viewSentAgreements
      tags:
        - Agreements
      parameters:
        - name: page
          type: integer
          in: query
          description: 50 items are displayed per page.
      responses:
        '200':
          description: Successful Operation
          schema:
            type: array
            items:
              $ref: '#/definitions/Agreement'
        '401':
          $ref: '#/responses/UnauthorizedError'
  /api/debit_agreements/received:
    get:
      summary: View Received Agreements
      operationId: viewReceivedAgreements
      tags:
        - Agreements
      parameters:
        - name: page
          type: integer
          in: query
          description: 50 items are displayed per page.
      responses:
        '200':
          description: Successful Operation
          schema:
            type: array
            items:
              $ref: '#/definitions/Agreement'
        '401':
          $ref: '#/responses/UnauthorizedError'
  '/api/debit_agreements/{token}/approve':
    post:
      summary: Approve an Agreement
      operationId: approveAgreement
      tags:
        - Agreements
      parameters:
        - in: path
          name: token
          type: string
          required: true
          description: The agreement identifier.
        - in: body
          name: fund_token
          schema:
            type: object
            properties:
              fund_token:
                type: string
                description: >
                  Your bank account or balance's token attribute. Omitting this
                  option will approve the agreement using your default bank
                  account.
                example: 5TH3ACC3AU21
      responses:
        '201':
          description: Created
          schema:
            $ref: '#/definitions/Agreement'
        '401':
          $ref: '#/responses/UnauthorizedError'
        '412':
          description: Precondition Failed
          schema:
            type: object
            additionalProperties:
              type: string
              description: Error message
            example:
              error: >
                API token does not have permission for this request. Please
                contact your account administrator.
  '/api/debit_agreements/{token}/cancel':
    post:
      summary: Cancel an Agreement
      operationId: cancelAgreement
      tags:
        - Agreements
      parameters:
        - in: path
          name: token
          type: string
          required: true
          description: The agreement identifier.
      responses:
        '200':
          description: Successful Operation
          schema:
            $ref: '#/definitions/Agreement'
        '401':
          $ref: '#/responses/UnauthorizedError'
  '/api/debit_agreements/{token}/reject':
    post:
      summary: Reject an Agreement
      description: >
        Reject a *pending* agreement by supplying an agreement's *token*
        attribute and providing a *rejection_reason*.
      operationId: rejectAgreement
      tags:
        - Agreements
      parameters:
        - in: path
          name: token
          type: string
          required: true
          description: The agreement identifier.
      responses:
        '200':
          description: Successful Operation
          schema:
            $ref: '#/definitions/Agreement'
        '401':
          $ref: '#/responses/UnauthorizedError'
  '/api/debit_agreements/{token}/revoke':
    post:
      summary: Revoke an Agreement
      description: >
        Revoke an *approved* agreement for your account by supplying an
        agreement's token attribute. The agreement's creator will no longer be
        able to debit your account using this agreement.
      operationId: revokeAgreement
      tags:
        - Agreements
      parameters:
        - name: token
          in: path
          type: string
          required: true
          description: The agreement identifier.
      responses:
        '200':
          description: Successful Operation
          schema:
            $ref: '#/definitions/Agreement'
  /send_money:
    get:
      summary: Single Payment Hosted Checkout
      description: >
        Clients, customers, or donors, for instance, can send your organization
        money directly from their bank account or credit card simply by clicking
        a link which displays a page with your account name allowing your
        customer to make a payment to you for the specified dollar amount:

        <br>

        `https://secure.versapay.com/send_money?api_token={your_api_token}&amount={dollar_amount_for_customer_to_pay}`

        <br>

        Funds will go to the fund destination passed in the to_fund parameter.
        By default, the funds will be deposited into your default bank account
        once the transaction clears from the other party.
      operationId: hostedCheckout
      tags:
        - Hosted Checkout
      parameters:
        - name: api_token
          in: query
          type: string
          required: true
          description: A valid API token generated from your account.
        - name: amount
          in: query
          type: number
          required: true
          description: The amount in dollars that the transaction is for.
        - name: message
          in: query
          type: string
          description: A message which will be stored with the transaction.
        - name: return_to
          in: query
          type: string
          description: >-
            A url which will displayed to the user to return to your website
            after they finish the Signup and Confirmation.
        - name: link_url
          in: query
          type: string
          description: >-
            A url that gets stored and displayed on the transaction for an
            invoice.
        - name: pref
          in: query
          type: string
          description: >-
            The preferred payment type either `ba` or `cc` for bank or credit
            card respectively.
        - name: to_fund
          in: query
          type: string
          description: >-
            The token of the bank account or balance where the funds should go
            to.
        - name: reference
          in: query
          type: string
          description: >-
            Extra data (max 255 characters). Great for storing internal order or
            account number.
        - name: locale
          in: query
          type: string
          description: >-
            Set the default language of the checkout, either `en` or `fr`. Users
            will still be able to switch to their preferred language.
      responses:
        '200':
          description: Successful Operation
  /authorize:
    get:
      summary: Debit Agreement Hosted Checkout
      description: >
        Clients, customers, or donors, for instance, can initiate a
        pre-authorized debit agreement by clicking a link on your website or in
        an email.

        <br>

        `https://secure.versapay.com/authorize?api_token={your_api_token}&message={explanation_of_what_this_is_for}`

        <br>
      tags:
        - Hosted Checkout
      parameters:
        - name: api_token
          in: query
          type: string
          required: true
          description: A valid API token generated from your account.
        - name: message
          in: query
          type: string
          required: true
          description: >-
            A message for the user describing the pre-authorized debit
            agreement.
        - name: return_to
          in: query
          type: string
          description: >-
            A url which will displayed to the user to return to your website
            after they finish the Signup and Confirmation.
        - name: reference
          in: query
          type: string
          description: >-
            Extra data (max 255 characters). Great for storing internal order or
            account number.
      responses:
        '200':
          description: Successful Operation
  /api/imports/customer:
    post:
      summary: Create and Update Customer
      operationId: createCustomer
      description: >
        Create a customer in ARC using the following attributes (at minimum by
        providing values for required attributes). If providing an identifier
        for an existing customer, its information is updated.<br><br>

        *Note: Any additional non-standard attribute will be stored with
        customer record and available for presentment rendering.*
      tags:
        - Customers
      parameters:
        - in: body
          name: body
          required: true
          schema:
            $ref: '#/definitions/Customer'
      responses:
        '201':
          description: Created
          schema:
            type: object
            properties:
              identifier:
                type: string
                example: C1234
              message:
                type: string
                example: 1 customer with 3 contacts
        '401':
          $ref: '#/responses/UnauthorizedError'
        '412':
          $ref: '#/responses/PreconditionFailed'
  /api/imports/invoice:
    post:
      summary: Create and Update Invoice
      description: >
        Create and update invoices in ARC. If the invoice already exists when a
        request is processed, it will be updated.<br><br>

        The set of attributes to send in the request body may vary based on the
        account configuration. Please contact the implementation specialist for
        more information.<br><br>

        *Note:*
          * *Customer will be created/updated using the customer_&ast; attributes if necessary at time of invoice import.*
          * *Any additional non-standard attribute will be stored with invoice record and available for presentment rendering.*
      operationId: createInvoice
      tags:
        - Invoices
      parameters:
        - in: body
          name: body
          required: true
          schema:
            $ref: '#/definitions/Invoice'
      responses:
        '201':
          description: Created
          schema:
            type: object
            properties:
              identifier:
                type: string
                example: INV002
              message:
                type: string
                example: 1 invoice 1 line items
        '401':
          $ref: '#/responses/UnauthorizedError'
        '412':
          $ref: '#/responses/PreconditionFailed'
  /api/imports/payment:
    post:
      summary: Create a Payment
      description: >
        Create and update external payment records in ARC.<br><br>The set of
        attributes to send in the request body may vary based on the account
        configuration. Please contact the implementation specialist for more
        information.<br><br>

        The request schema for posting a payment for a single invoice is
        slightly different than that for posting a payment for multiple
        invoices.


        For instance, sample request for posting payment for a single invoice
        looks like:

        ```

        {
          "identifier": "PMT0010-05",
          "invoice_number": "INV1234-01",
          "amount": 10000,
          "currency": "usd",
          "date": "2018-01-10",
          "customer_identifier": "C1234",
          "customer_name": "Acme Inc.",
          "notes": "Notes",
          "ref1": "1234",
          "ref2": "PO# 84767"
        }

        ```


        *Note: Customer will be created using the customer_&ast; attributes if
        it doesn’t already exist at the time of payment import.*
      operationId: createPayment
      tags:
        - Payments
      parameters:
        - in: body
          name: body
          required: true
          schema:
            $ref: '#/definitions/PaymentImport'
      responses:
        '201':
          description: Created
          schema:
            type: object
            properties:
              identifier:
                type: string
                example: PMT123
              message:
                type: string
                example: 1 payment 1 invoice amounts
        '401':
          $ref: '#/responses/UnauthorizedError'
        '412':
          $ref: '#/responses/PreconditionFailed'
  /api/imports:
    post:
      summary: Import a CSV File
      description: >
        When uploading a CSV-formatted file it’s helpful to use your
        language/framework tooling to simplify the
        [multipart/form-data](https://www.ietf.org/rfc/rfc2388.txt) file upload.

        ### Size Limit

        The file cannot exceed 25MB.

        ### Layouts

        Please contact support@versapay.com or reach out to your implementation
        specialist for standard inbound CSV file layouts.
      operationId: importBatchFile
      consumes:
        - multipart/form-data
      tags:
        - File Imports
      parameters:
        - in: formData
          name: file
          required: true
          type: file
          description: The file to upload.
        - in: formData
          name: filename
          type: string
          description: Name of original file.
      responses:
        '201':
          description: Created
          schema:
            $ref: '#/definitions/FileImport'
        '401':
          $ref: '#/responses/UnauthorizedError'
      x-code-samples:
        - lang: cURL
          source: |
            curl \
            -u "Nvax...:UN0I..." \
            -F "filename=data.csv" \
            -F "file=@/home/user/Desktop/data.csv" \
            https://secure.versapay.com/api/imports/
        - lang: Ruby
          source: >
            file = { :file => File.new('/home/user/Desktop/data.csv') }

            auth = { :basic_auth => { :username => 'Nvax...', :password =>
            'UN0I...' } }

            HTTMultiParty.post('https://secure.versapay.com/api/imports/',
            auth.merge( :query => file ))
    get:
